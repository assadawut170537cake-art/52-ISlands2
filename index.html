        const apiKey = ""; // <--- ⚠️ วาง API KEY ของ Gemini ตรงนี้
        
        const fetchGemini = async (prompt, systemInstruction = "", base64Image = null) => {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            
            const parts = [{ text: prompt }];
            if (base64Image) {
                const base64Data = base64Image.split(',')[1];
                parts.push({ inlineData: { data: base64Data, mimeType: "image/jpeg" } });
            }

            const payload = { contents: [{ parts }] };
            if (systemInstruction) {
                payload.systemInstruction = { parts: [{ text: systemInstruction }] };
            }

            let retries = 5;
            let delay = 1000;
            while (retries > 0) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text || "";
                } catch (error) {
                    retries--;
                    if (retries === 0) {
                        console.error("Gemini API Error:", error);
                        throw error;
                    }
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2;
                }
            }
        };

        // ============================================================
        // COMPONENT: FloatingAIChat
        // ============================================================
        function FloatingAIChat({ isAdmin, userEmail, showNotification }) {
            const [messages, setMessages] = useState([
                { id: 1, role: 'ai', text: 'สวัสดีครับพี่ 👋 ผมคือ AI ประจำไซต์งาน มีอะไรให้ผมช่วยวิเคราะห์หรือร่างรายงานไหมครับ?' }
            ]);
            const [inputMsg, setInputMsg] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [isOpen, setIsOpen] = useState(false);
            
            // Drag State
            const [position, setPosition] = useState({ x: window.innerWidth - 80, y: window.innerHeight - 100 });
            const [isDragging, setIsDragging] = useState(false);
            const dragRef = useRef({ startX: 0, startY: 0, currentX: position.x, currentY: position.y });
            const messagesEndRef = useRef(null);

            useEffect(() => {
                if (isOpen) messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages, isTyping, isOpen]);

            // Handle Dragging
            const handleMouseDown = (e) => {
                setIsDragging(true);
                dragRef.current.startX = e.clientX || e.touches?.[0].clientX;
                dragRef.current.startY = e.clientY || e.touches?.[0].clientY;
            };

            const handleMouseMove = useCallback((e) => {
                if (!isDragging) return;
                const clientX = e.clientX || e.touches?.[0].clientX;
                const clientY = e.clientY || e.touches?.[0].clientY;
                const deltaX = clientX - dragRef.current.startX;
                const deltaY = clientY - dragRef.current.startY;
                
                let newX = dragRef.current.currentX + deltaX;
                let newY = dragRef.current.currentY + deltaY;
                
                // Boundary check
                newX = Math.max(0, Math.min(newX, window.innerWidth - 60));
                newY = Math.max(0, Math.min(newY, window.innerHeight - 60));

                setPosition({ x: newX, y: newY });
            }, [isDragging]);

            const handleMouseUp = useCallback(() => {
                if (isDragging) {
                    setIsDragging(false);
                    dragRef.current.currentX = position.x;
                    dragRef.current.currentY = position.y;
                }
            }, [isDragging, position]);

            useEffect(() => {
                if (isDragging) {
                    window.addEventListener('mousemove', handleMouseMove);
                    window.addEventListener('mouseup', handleMouseUp);
                    window.addEventListener('touchmove', handleMouseMove, { passive: false });
                    window.addEventListener('touchend', handleMouseUp);
                } else {
                    window.removeEventListener('mousemove', handleMouseMove);
                    window.removeEventListener('mouseup', handleMouseUp);
                    window.removeEventListener('touchmove', handleMouseMove);
                    window.removeEventListener('touchend', handleMouseUp);
                }
                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                    window.removeEventListener('mouseup', handleMouseUp);
                    window.removeEventListener('touchmove', handleMouseMove);
                    window.removeEventListener('touchend', handleMouseUp);
                };
            }, [isDragging, handleMouseMove, handleMouseUp]);

            const sendChatMessage = async () => {
                if (!inputMsg.trim()) return;
                const userText = inputMsg;
                setMessages(prev => [...prev, { id: Date.now(), role: 'user', text: userText }]);
                setInputMsg('');
                setIsTyping(true);

                try {
                    const systemPrompt = "คุณคือผู้ช่วย AI ประจำไซต์ก่อสร้าง ตอบคำถามเป็นภาษาไทยอย่างมืออาชีพ กระชับ มีประโยชน์";
                    const responseText = await fetchGemini(userText, systemPrompt);
                    setMessages(prev => [...prev, { id: Date.now()+1, role: 'ai', text: responseText }]);
                } catch (err) {
                    setMessages(prev => [...prev, { id: Date.now()+1, role: 'ai', text: '❌ ไม่สามารถติดต่อเซิร์ฟเวอร์ AI ได้' }]);
                } finally {
                    setIsTyping(false);
                }
            };

            return (
                <div 
                    className="fixed z-[100] flex flex-col items-end"
                    style={{ left: position.x, top: position.y, transform: isOpen ? 'translate(-85%, -100%)' : 'translate(0, 0)' }}
                >
                    {/* Chat Window */}
                    {isOpen && (
                        <div className="bg-white rounded-2xl shadow-2xl border border-slate-200 overflow-hidden w-[90vw] sm:w-80 max-w-sm mb-4 flex flex-col animate-fade-in" style={{ height: '400px' }}>
                            <div 
                                className="bg-gradient-to-r from-violet-600 to-indigo-600 px-4 py-3 flex items-center justify-between cursor-move"
                                onMouseDown={handleMouseDown}
                                onTouchStart={handleMouseDown}
                            >
                                <div className="flex items-center gap-2 text-white">
                                    <Icon.Bot c="w-5 h-5" />
                                    <div>
                                        <div className="font-bold text-sm">AI Assistant</div>
                                        <div className="text-white/70 text-[10px]">Gemini 2.5 Engine (ลากเพื่อย้าย)</div>
                                    </div>
                                </div>
                                <button onClick={() => setIsOpen(false)} className="text-white hover:bg-white/20 p-1 rounded">
                                    <Icon.X c="w-4 h-4" />
                                </button>
                            </div>
                            
                            <div className="flex-1 bg-slate-50 overflow-y-auto p-3 space-y-3">
                                {messages.map(msg => (
                                    <div key={msg.id} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} items-end gap-2`}>
                                        <div className={msg.role === 'ai' ? 'chat-bubble-ai' : 'chat-bubble-user'}>{msg.text}</div>
                                    </div>
                                ))}
                                {isTyping && (
                                    <div className="chat-bubble-ai flex gap-1 py-3 w-16 justify-center">
                                        <div className="typing-dot"></div><div className="typing-dot"></div><div className="typing-dot"></div>
                                    </div>
                                )}
                                <div ref={messagesEndRef} />
                            </div>

                            <div className="p-3 bg-white border-t border-slate-100 flex gap-2">
                                <input
                                    type="text"
                                    value={inputMsg}
                                    onChange={e => setInputMsg(e.target.value)}
                                    onKeyDown={e => e.key === 'Enter' && sendChatMessage()}
                                    placeholder="พิมพ์ถาม AI..."
                                    className="flex-1 bg-slate-100 rounded-xl px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-violet-400"
                                />
                                <button onClick={sendChatMessage} disabled={!inputMsg.trim()} className="bg-violet-600 text-white p-2 rounded-xl disabled:bg-slate-300">
                                    <Icon.Send c="w-4 h-4" />
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Floating Button */}
                    {!isOpen && (
                        <button 
                            onMouseDown={handleMouseDown}
                            onTouchStart={handleMouseDown}
                            onClick={() => !isDragging && setIsOpen(true)}
                            className="w-14 h-14 bg-gradient-to-r from-violet-600 to-indigo-600 rounded-full shadow-xl flex items-center justify-center text-white hover:scale-105 active:scale-95 transition-transform cursor-grab active:cursor-grabbing border-2 border-white"
                        >
                            <Icon.Sparkles c="w-6 h-6" />
                        </button>
                    )}
                </div>
            );
        }

                            <textarea value={fastText} onChange={e => setFastText(e.target.value)} rows={4} placeholder={'ตัวอย่าง: "ช่างบอย กับ ช่างอ้น เข้าไซต์บางนา เลิกงานทุ่มครึ่ง โอทีสามชั่วโมง"'} className="w-full rounded-xl border border-slate-200 bg-slate-50 px-3 py-2.5 text-xs sm:text-sm text-slate-700 placeholder-slate-400 italic focus:outline-none focus:border-indigo-400 focus:bg-white resize-none transition-all" />
                            <button onClick={handleMic} className={`absolute bottom-3 right-3 p-1.5 rounded-lg transition-all ${isRecording ? 'bg-red-100 text-red-500 pulse-mic' : 'bg-indigo-50 text-indigo-400 hover:text-indigo-600'}`}>
                                <Icon.Mic c="w-4 h-4" />

                        <button onClick={processFastTrackAI} disabled={!fastText.trim() || isProcessing} className="w-full py-2.5 rounded-xl font-semibold text-xs sm:text-sm transition-all flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-200 disabled:text-slate-400 text-white shadow-md hover:shadow-lg">
                            {isProcessing ? <><div className="spinner" style={{width:'16px',height:'16px',borderTopColor:'white'}}></div> กำลังประมวลผล...</> : <><Icon.Sparkles c="w-4 h-4" /> ประมวลผลด้วย AI ✨</>}
                        </button>
                    </div>
                </div>
            );
        }

                                    <img src={LOGO_URL} alt="App Icon" className="w-full h-full object-contain" />

        // ============================================================================
        // COMPONENT: AppTab (เชื่อมต่อ API และเพิ่มระบบบันทึกแบบคิวป้องกันข้อมูลสูญหาย 100%)
        // ============================================================================
        function AppTab({ employees, dailyReports, setDailyReports, showNotification, setActiveTab, isAdmin, dropdownData, t }) {
            // ดึงข้อมูลไซต์งานจริงที่ถูกดึงมาจากแผ่นงาน DATA หลังบ้าน
            const { sites = [], accommodations = [] } = dropdownData || {};

            const activeEmps = useMemo(() => employees.filter(emp => emp.K === 'ปกติ'), [employees]);
            const residenceGroups = useMemo(() => {
                const groups = new Set(activeEmps.map(emp => emp.J).filter(Boolean));
                return Array.from(groups).sort();
            }, [activeEmps]);

            const [step, setStep] = useState(1);
            const [activeInputMode, setActiveInputMode] = useState('manual');
            const [inputText, setInputText] = useState('');
            const [isRecording, setIsRecording] = useState(false);
            const [isLoading, setIsLoading] = useState(false);
            const [uploadedImage, setUploadedImage] = useState(null);
            const fileInputRef = useRef(null);

            const [selectedDate, setSelectedDate] = useState(() => { 
                const tzoffset = (new Date()).getTimezoneOffset() * 60000; 
                return (new Date(Date.now() - tzoffset)).toISOString().split('T')[0]; 
            });
            const [selectedSite, setSelectedSite] = useState('');
            const [gpsCoords, setGpsCoords] = useState(null);
            const [gpsStatusText, setGpsStatusText] = useState('');

            const [bulkStartTime, setBulkStartTime] = useState('08:00');
            const [bulkEndTime, setBulkEndTime] = useState('17:00');
            const [workH, setWorkH] = useState('8');
            const [otH, setOtH] = useState('0');
            const [bulkNote, setBulkNote] = useState('');

            const [selectedGroup, setSelectedGroup] = useState('');
            const [selectedEmployees, setSelectedEmployees] = useState([]);
            const [employeeCustomData, setEmployeeCustomData] = useState({});

            const [otSite1, setOtSite1] = useState('');
            const [otTime1, setOtTime1] = useState('17:00-18:00');
            const [otSite2, setOtSite2] = useState('');
            const [otTime2, setOtTime2] = useState('18:00-19:00');

            const [isAuditing, setIsAuditing] = useState(false);
            const [auditResult, setAuditResult] = useState(null);
            const [isSaving, setIsSaving] = useState(false);

            useEffect(() => {
                if (bulkStartTime && bulkEndTime) {
                    const [iH,iM] = bulkStartTime.split(':').map(Number);
                    const [oH,oM] = bulkEndTime.split(':').map(Number);
                    let total = (oH + oM/60) - (iH + iM/60);
                    if (total < 0) total += 24; 
                    if (total > 0) {
                        let net = total >= 5 ? total - 1 : total; 
                        let ot = 0, norm = net;
                        if (oH >= 17 && iH < 17) { ot = (oH + oM/60) - 17; norm = net - ot; }
                        else if (net > 8) { ot = net - 8; norm = 8; }
                        const r = n => Math.round(n*2)/2;
                        setWorkH(r(Math.max(0,norm)).toString());
                        setOtH(r(Math.max(0,ot)).toString());
                    }
                }
            }, [bulkStartTime, bulkEndTime]);

            const nextStep = () => {
                if (step === 1 && (!selectedDate || !selectedSite)) { return showNotification('กรุณาระบุวันที่และไซต์งานให้ครบถ้วน', 'error'); }
                if (step === 2 && (!bulkStartTime || !bulkEndTime)) { return showNotification('กรุณาระบุเวลาให้ครบถ้วน', 'error'); }
                if (step === 4 && selectedEmployees.length === 0) { return showNotification('กรุณาเลือกพนักงานอย่างน้อย 1 คน', 'error'); }
                setStep(s => Math.min(5, s + 1));
            };
            const prevStep = () => setStep(s => Math.max(1, s - 1));

            const calculateHaversineDistance = (lat1, lon1, lat2, lon2) => {
                const R = 6371; 
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
                return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
            };

            const handleGpsDetection = () => {
                if (!navigator.geolocation) return showNotification('เบราว์เซอร์นี้ไม่รองรับพิกัด GPS', 'error');
                setGpsStatusText('กำลังดึงพิกัด...');
                
                const sitesWithCoords = typeof MOCK_SITES_WITH_COORDS !== 'undefined' ? MOCK_SITES_WITH_COORDS : [];
                if (sitesWithCoords.length === 0) {
                    setGpsStatusText('⚠️ ไม่พบข้อมูลพิกัดไซต์งานอ้างอิง');
                    return;
                }

                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const { latitude: userLat, longitude: userLng } = position.coords;
                        setGpsCoords({ lat: userLat, lng: userLng });
                        let nearestSite = null, shortestDistance = Infinity;
                        sitesWithCoords.forEach((site) => {
                            const distance = calculateHaversineDistance(userLat, userLng, site.lat, site.lng);
                            if (distance < shortestDistance) { shortestDistance = distance; nearestSite = site; }
                        });
                        if (nearestSite) {
                            setSelectedSite(nearestSite.name);
                            setGpsStatusText(`🎯 ใกล้เคียง "${nearestSite.name}" (${shortestDistance.toFixed(2)} กม.)`);
                            showNotification(`ระบบระบุไซต์ "${nearestSite.name}" อัตโนมัติ`);
                        }
                    },
                    (error) => { setGpsStatusText('❌ ดึงพิกัดล้มเหลว'); showNotification('โปรดอนุญาต GPS', 'error'); },
                    { enableHighAccuracy: true, timeout: 8000 }
                );
            };

            const processAI = async () => {
                if (!inputText.trim()) { showNotification('กรุณาพิมพ์ข้อมูล', 'error'); return; }
                setIsLoading(true); showNotification('🧠 Gemini AI กำลังสกัดข้อมูล...', 'success');
                try {
                    const prompt = `ดึงข้อมูลจาก: "${inputText}"\nตอบเป็น JSON keys: site(string), startTime(HH:MM), endTime(HH:MM), names(array of strings)`;
                    const resultText = await fetchGemini(prompt, "You are a helpful data extraction AI for Thai construction records. Output strictly valid JSON without markdown formatting like ```json.");
                    const data = JSON.parse(resultText.replace(/```json/gi, '').replace(/```/g, '').trim());
                    applyAIParsedData(data);
                } catch (error) {
                    showNotification('❌ วิเคราะห์ไม่สำเร็จ ลองประโยคที่ชัดเจนขึ้น', 'error');
                } finally { setIsLoading(false); }
            };

            const processImageWithAI = async (base64DataUrl) => {
                setIsLoading(true); showNotification('👁️ Vision AI กำลังสแกนใบงาน...', 'success');
                try {
                    const prompt = `แกะข้อมูลลายมือจากภาพ\nตอบเป็น JSON keys: date(YYYY-MM-DD), site, startTime, endTime, names(array)`;
                    const resultText = await fetchGemini(prompt, "You are a Vision OCR AI. Output ONLY valid JSON without markdown.", base64DataUrl);
                    const data = JSON.parse(resultText.replace(/```json/gi, '').replace(/```/g, '').trim());
                    applyAIParsedData(data);
                } catch (error) {
                    showNotification('❌ แปลงภาพคลาดเคลื่อน ตรวจสอบความชัดของภาพ', 'error');
                } finally { setIsLoading(false); }
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => { setUploadedImage(reader.result); processImageWithAI(reader.result); };
                    reader.readAsDataURL(file);
                }
            };

            const applyAIParsedData = (data) => {
                if (data.date) setSelectedDate(data.date);
                if (data.site) {
                    const matchedSite = sites.find(s => s.includes(data.site)) || data.site;
                    setSelectedSite(matchedSite);
                }
                if (data.startTime) setBulkStartTime(data.startTime);
                if (data.endTime) setBulkEndTime(data.endTime);
                if (data.names && data.names.length > 0) {
                    const matchedIds = [];
                    data.names.forEach(name => {
                        const found = activeEmps.find(e => e.E.includes(name) || e.C.includes(name));
                        if (found) matchedIds.push(found.N);
                    });
                    if (matchedIds.length > 0) {
                        setSelectedEmployees(matchedIds);
                        const firstEmp = activeEmps.find(e => e.N === matchedIds[0]);
                        if (firstEmp) setSelectedGroup(firstEmp.J);
                        setStep(4);
                    }
                }
                showNotification('✅ AI กรอกข้อมูลลงฟอร์มสำเร็จ!', 'success');
            };

            const toggleEmployeeSelection = (empId) => setSelectedEmployees(prev => prev.includes(empId) ? prev.filter(id => id !== empId) : [...prev, empId]);
            const selectAllEmployees = () => {
                const currentList = selectedGroup ? activeEmps.filter(emp => emp.J === selectedGroup) : activeEmps;
                const currentIds = currentList.map(emp => emp.N);
                const isAllSelected = currentIds.every(id => selectedEmployees.includes(id));
                setSelectedEmployees(isAllSelected ? prev => prev.filter(id => !currentIds.includes(id)) : prev => Array.from(new Set([...prev, ...currentIds])));
            };
            const clearSelection = () => setSelectedEmployees([]);
            const handleIndividualChange = (empId, field, value) => {
                setEmployeeCustomData(prev => ({
                    ...prev, [empId]: { startTime: prev[empId]?.startTime || bulkStartTime, endTime: prev[empId]?.endTime || bulkEndTime, note: prev[empId]?.note || bulkNote, [field]: value }
                }));
            };

            const auditTimesheetWithAI = async () => {
                setIsAuditing(true); showNotification('🛡️ AI กำลังประเมินกฎหมายแรงงาน...', 'success');
                const auditData = { date: selectedDate, site: selectedSite, timeIn: bulkStartTime, timeOut: bulkEndTime, employeeCount: selectedEmployees.length };
                try {
                    const prompt = `วิเคราะห์กะงาน: ${JSON.stringify(auditData)}\nตอบ JSON keys: riskScore(0-100), status("pass"/"warning"), laborLawCompliance, safetyWarnings(Array)`;
                    const resultText = await fetchGemini(prompt, "You are a Safety & Labor Law Auditor AI. Output ONLY valid JSON.");
                    setAuditResult(JSON.parse(resultText.replace(/```json/gi, '').replace(/```/g, '').trim()));
                    showNotification('✨ ตรวจสอบความปลอดภัยสำเร็จ!', 'success');
                } catch (error) {
                    showNotification('ระบบประเมินผลล้มเหลว', 'error');
                } finally { setIsAuditing(false); }
            };

            const generateLineReport = () => {
                const presentCount = selectedEmployees.length;
                let otHoursSum = otSite2 ? 2 : otSite1 ? 1 : Number(otH);
                let msg = `👷‍♂️ SMART WORKSITE REPORT 👷‍♂️\n---------------------------------------\n📅 Date: ${selectedDate}\n⏰ Time: [${bulkStartTime}-${bulkEndTime}] = ${workH} Hr. / OT = ${otHoursSum} Hr.\n👥 Group: ${selectedGroup || 'ทั้งหมด'}\n📍 Site: ${selectedSite}\n`;
                if (otSite1) msg += `🌙 OT 1: [${otTime1}] ${otSite1}\n`;
                if (otSite2) msg += `🌙 OT 2: [${otTime2}] ${otSite2}\n`;
                msg += `---------------------------------------\n📊 Attendance (${presentCount} Present):\n`;
                
                let idx = 1;
                const filteredEmp = selectedGroup ? activeEmps.filter(emp => emp.J === selectedGroup) : activeEmps;
                filteredEmp.forEach(emp => {
                    if (selectedEmployees.includes(emp.N)) {
                        const custom = employeeCustomData[emp.N] || { note: bulkNote };
                        const noteStr = custom.note ? `[${custom.note}]` : '[ปฏิบัติงานทั่วไป]';
                        msg += `${idx++}. ✅ ${emp.C} ${emp.D} ${noteStr}\n`;
                    }
                });
                
                const absent = filteredEmp.filter(emp => !selectedEmployees.includes(emp.N));
                if (absent.length > 0) {
                    msg += `\n⛔หยุด!!\n`;
                    absent.forEach((emp, i) => { msg += `${i + 1}. ❌ ${emp.C} ${emp.D} [${emp.N}]\n`; });
                }
                return msg;
            };

            const handleShareToLine = () => window.open(`https://line.me/R/share?text=${encodeURIComponent(generateLineReport())}`, '_blank');
            const handleCopyToClipboard = () => { 
                const text = generateLineReport();
                const textarea = document.createElement("textarea");
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand("copy");
                document.body.removeChild(textarea);
                showNotification('📋 คัดลอกลง Clipboard เรียบร้อย!'); 
            };

            // 🟢 ระบบบันทึกข้อมูลจริงเรียงลำดับแบบ Queue ป้องกันปัญหา Lock Timeout และบันทึกซ้ำซ้อน
            const handleFinalSubmitWithLog = (e) => {
                e.preventDefault();
                if (selectedEmployees.length === 0) return showNotification('กรุณาเลือกพนักงานก่อนบันทึก', 'error');
                
                setIsSaving(true); 
                showNotification('⏳ เริ่มคิวกระบวนการบันทึกข้อมูลพนักงานลงฐานข้อมูลชีท...', 'success');
                
                const otCalculated = otSite2 ? 2 : otSite1 ? 1 : Number(otH);
                const employeeNames = selectedEmployees.map(id => activeEmps.find(e => e.N === id)?.E || id);

                if (typeof google !== 'undefined' && google.script && google.script.run) {
                    
                    // ฟังก์ชันลูกแบบ Recursive สั่งส่งข้อมูลพนักงานทีละรายชื่อแบบเรียงคิว
                    const saveWorkerSequential = (index) => {
                        if (index >= selectedEmployees.length) {
                            // บันทึกครบทุกคนเรียบร้อย
                            setIsSaving(false);
                            showNotification(`✅ บันทึกข้อมูลพนักงานลงชีทรายงานสำเร็จครบถ้วน ทั้งหมด ${selectedEmployees.length} คนแล้วครับ`, 'success');
                            
                            // ปรับปรุงประวัติประเมินในหน้าเว็บ
                            setDailyReports(prev => [{ 
                                id: Date.now(), 
                                date: selectedDate, 
                                site: selectedSite, 
                                timeIn: bulkStartTime, 
                                timeOut: bulkEndTime, 
                                normalHour: Number(workH), 
                                otTotal: otCalculated, 
                                employeesCount: selectedEmployees.length, 
                                names: employeeNames.join(', ') 
                            }, ...prev]);
                            setActiveTab('dashboard');
                            return;
                        }

                        const empId = selectedEmployees[index];
                        const currentWorker = activeEmps.find(e => e.N === empId);
                        const workerName = currentWorker ? currentWorker.E : empId;
                        const workerCamp = currentWorker ? currentWorker.J : '';
                        const customDetails = employeeCustomData[empId] || { note: bulkNote };

                        // จัดเตรียม Payload แยกสำหรับรายบุคคลเพื่อส่งบันทึกแยกแถวอย่างแม่นยำ
                        const singlePayload = {
                            workDate: selectedDate,
                            siteName: selectedSite,
                            staffName: workerName,
                            accommodation: workerCamp,
                            note: customDetails.note || bulkNote,
                            isAdmin: isAdmin
                        };

                        google.script.run
                            .withSuccessHandler((response) => {
                                if (response.success) {
                                    // ยิงแถวถัดไปในคิวทันทีเมื่อเซิร์ฟเวอร์ตอบกลับว่าสำเร็จ
                                    saveWorkerSequential(index + 1);
                                } else {
                                    setIsSaving(false);
                                    showNotification(`❌ เกิดข้อผิดพลาดที่รายชื่อ ${workerName}: ${response.message}`, 'error');
                                }
                            })
                            .withFailureHandler((error) => {
                                setIsSaving(false);
                                showNotification(`❌ การส่งข้อมูลขัดข้อง: ${error.message}`, 'error');
                            })
                            .saveDailyReport(singlePayload);
                    };

                    // เริ่มรันคิวพนักงานคนที่ 1 (Index 0)
                    saveWorkerSequential(0);

                } else {
                    // โหมดทดสอบสำหรับระบบ Offline Sandbox
                    setTimeout(() => {
                        setIsSaving(false); 
                        showNotification('✅ [Offline] บันทึกรายงานสำเร็จเสมือนจริง', 'success');
                        setDailyReports(prev => [{ id: Date.now(), date: selectedDate, site: selectedSite, timeIn: bulkStartTime, timeOut: bulkEndTime, normalHour: Number(workH), otTotal: otCalculated, employeesCount: selectedEmployees.length, names: employeeNames.join(', ') }, ...prev]);
                        setActiveTab('dashboard');
                    }, 1500);
                }
            };

            const filteredEmp = selectedGroup ? activeEmps.filter(emp => emp.J === selectedGroup) : activeEmps;

            return (
                <div className="space-y-6 pb-8 animate-fade-in max-w-full">
                    <div className="flex bg-slate-200/70 p-1 rounded-xl shadow-inner max-w-full md:max-w-sm ml-auto overflow-x-auto">
                        {['manual', 'voice', 'image'].map((mode) => (
                            <button key={mode} type="button" onClick={() => setActiveInputMode(mode)} className={`flex-1 px-2 sm:px-3 py-1.5 text-[9px] sm:text-xs font-bold rounded-lg transition-all whitespace-nowrap ${activeInputMode === mode ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                                {mode === 'manual' ? 'คีย์มือ' : mode === 'voice' ? '🎙️ สั่งเสียง' : '📷 สแกนภาพ'}
                            </button>
                        ))}
                    </div>

                    {activeInputMode === 'voice' && (

        // ============================================================
        // COMPONENT: ArchiveTab (Monthly Vault)
        // ============================================================
        const ArchiveTab = ({ dailyReports, setDailyReports, showNotification }) => {
            const [selectedMonth, setSelectedMonth] = useState(null);
            const currentYear = new Date().getFullYear();
            const currentMonthIndex = new Date().getMonth();
            
            const months = [
                { id: '01', name: 'มกราคม', icon: '❄️' },
                { id: '02', name: 'กุมภาพันธ์', icon: '💘' },
                { id: '03', name: 'มีนาคม', icon: '🪁' },
                { id: '04', name: 'เมษายน', icon: '💦' },
                { id: '05', name: 'พฤษภาคม', icon: '🌱' },
                { id: '06', name: 'มิถุนายน', icon: '☔' },
                { id: '07', name: 'กรกฎาคม', icon: '🦁' },
                { id: '08', name: 'สิงหาคม', icon: '💙' },
                { id: '09', name: 'กันยายน', icon: '🍂' },
                { id: '10', name: 'ตุลาคม', icon: '🎃' },
                { id: '11', name: 'พฤศจิกายน', icon: '🌕' },
                { id: '12', name: 'ธันวาคม', icon: '🎄' },
            ].map((m, index) => {
                let status = 'upcoming';
                if (index < currentMonthIndex) status = 'completed'; 
                if (index === currentMonthIndex) status = 'current'; 
                return { ...m, status }; 
            }); 
            
            const filteredReports = useMemo(() => {
                if (!selectedMonth) return [];
                return dailyReports.filter(report => {
                    if (!report.date) return false;
                    const reportMonth = report.date.split('-')[1];
                    return reportMonth === selectedMonth;
                }).sort((a, b) => new Date(b.date) - new Date(a.date)); 
            }, [dailyReports, selectedMonth]);
            
            const handleDelete = (id) => {
                if(window.confirm('คุณต้องการลบรายการนี้ใช่หรือไม่?')) {
                    setDailyReports(prev => prev.filter(r => r.id !== id));
                    showNotification('🗑️ ลบข้อมูลเรียบร้อยแล้ว', 'success');
                }
            };

            const exportCSV = () => {
                let csv = "\uFEFFลำดับ,วันที่,ไซต์งาน,เวลาเข้า,เวลาออก,ชั่วโมงปกติ,OT,จำนวนคน,รายชื่อ\r\n";
                filteredReports.forEach((r,i) => {
                    csv += [i+1, r.date, `"${r.site}"`, r.timeIn, r.timeOut, r.normalHour, r.otTotal, r.employeesCount, `"${r.names}"`].join(',') + '\r\n';
                });
                const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `รายงานเดือน_${selectedMonth}_${currentYear}.csv`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);

        function AdminTab({ employees, setEmployees, isAdmin, showNotification }) {
            const [showAdd, setShowAdd] = useState(false);
            const [form, setForm] = useState({B:'นาย',C:'',D:'',J:'',K:'ปกติ',N:''});
            const [search, setSearch] = useState('');

            if (!isAdmin) {
                return (
                    <div className="flex flex-col items-center justify-center py-12 sm:py-16 space-y-3 sm:space-y-4 px-4 text-center">

                    </div>
                );
            }

            const addEmp = (e) => {
                e.preventDefault();
                if (!form.C || !form.D || !form.N) { showNotification('กรอกข้อมูลให้ครบ','error'); return; }
                if (employees.some(x=>x.N===form.N)) { showNotification('รหัสซ้ำในระบบ','error'); return; }
                setEmployees(prev => [...prev, {...form, A:prev.length+2, E:`${form.B} ${form.C} ${form.D}`}]);
                showNotification(`เพิ่ม ${form.C} ${form.D} สำเร็จ`);
                setForm({B:'นาย',C:'',D:'',J:'',K:'ปกติ',N:''}); setShowAdd(false);
            };

            const filtered = employees.filter(e =>
                e.E?.toLowerCase().includes(search.toLowerCase()) || e.N?.includes(search)
            );

            return (
                <div className="space-y-4 pb-6 w-full">

                        <button onClick={()=>setShowAdd(!showAdd)} className={`text-[10px] sm:text-xs font-semibold px-2 sm:px-3 py-1.5 sm:py-2 rounded-xl transition-all ${showAdd ? 'bg-slate-200 text-slate-600' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}>

                        </button>
                    </div>

                    {showAdd && (
                        <form onSubmit={addEmp} className="bg-indigo-50 rounded-2xl border border-indigo-200 p-3 sm:p-4 space-y-3">

                                {[{l:'คำนำหน้า',k:'B',type:'select',opts:['นาย','นาง','น.ส.','ด.ช.','ด.ญ.']},
                                  {l:'ชื่อ',k:'C',type:'text'},{l:'นามสกุล',k:'D',type:'text'},
                                  {l:'แคมป์/ที่พัก',k:'J',type:'text'},{l:'รหัส 5 หลัก',k:'N',type:'text'},
                                  {l:'สถานะ',k:'K',type:'select',opts:['ปกติ','ลาออก']}].map(f => (
                                    <div key={f.k}>
                                        <label className="text-[10px] sm:text-xs font-semibold text-slate-600 mb-1 block">{f.l}</label>
                                        {f.type === 'select'
                                            ? <select value={form[f.k]} onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))} className="w-full rounded-xl border border-slate-200 px-2 sm:px-3 py-1.5 sm:py-2 text-[10px] sm:text-sm focus:outline-none bg-white">{f.opts.map(o=><option key={o}>{o}</option>)}</select>
                                            : <input type="text" value={form[f.k]} onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))} className="w-full rounded-xl border border-slate-200 px-2 sm:px-3 py-1.5 sm:py-2 text-[10px] sm:text-sm focus:outline-none bg-white" />
                                        }
                                    </div>
                                ))}
                            </div>
                            <button type="submit" className="w-full bg-indigo-600 text-white py-2 sm:py-2.5 rounded-xl font-bold text-[10px] sm:text-sm hover:bg-indigo-700 transition-all">บันทึกพนักงานใหม่</button>
                        </form>
                    )}

                    <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="ค้นหาชื่อหรือรหัสพนักงาน..."
                        className="w-full rounded-xl border border-slate-200 px-3 sm:px-4 py-2 sm:py-2.5 text-xs sm:text-sm focus:outline-none focus:border-indigo-400 bg-white" />

                    <div className="space-y-2 max-h-[400px] overflow-y-auto pr-1">
                        {filtered.map(emp => (
                            <div key={emp.N} className="bg-white rounded-xl border border-slate-100 p-2 sm:p-3 flex items-center gap-2 sm:gap-3 shadow-sm w-full">
                                <div className={`w-8 h-8 sm:w-10 sm:h-10 rounded-full flex-shrink-0 flex items-center justify-center text-xs sm:text-sm font-bold ${emp.K==='ปกติ' ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-400'}`}>
                                    {emp.C?.[0]}
                                </div>
                                <div className="flex-1 truncate">
                                    <div className="font-bold text-slate-700 text-xs sm:text-sm truncate">{emp.E}</div>
                                    <div className="text-[9px] sm:text-xs text-slate-400 truncate">รหัส: {emp.N} | {emp.J}</div>
                                </div>
                                <div className="flex items-center gap-1 sm:gap-2 shrink-0">
                                    <button onClick={() => { setEmployees(prev=>prev.map(e=>e.N===emp.N?{...e,K:e.K==='ปกติ'?'ลาออก':'ปกติ'}:e)); showNotification(`ปรับสถานะ ${emp.C} แล้ว`); }}
                                        className={`text-[9px] sm:text-xs px-2 py-1 rounded-lg font-medium transition-all ${emp.K==='ปกติ' ? 'bg-emerald-100 text-emerald-700 hover:bg-emerald-200' : 'bg-red-100 text-red-500 hover:bg-red-200'}`}>
                                        {emp.K}
                                    </button>
                                    <button onClick={() => { if(confirm(`ลบ ${emp.E}?`)) { setEmployees(prev=>prev.filter(e=>e.N!==emp.N)); showNotification('ลบเรียบร้อย','error'); } }}
                                        className="text-red-400 hover:text-red-600 p-1 sm:ml-1 transition-colors">
                                        <Icon.Trash c="w-3.5 h-3.5 sm:w-4 sm:h-4" />
                                    </button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

                    <header className="bg-slate-900 text-white sticky top-0 z-50 shadow-xl w-full">
                        <div className="flex items-center justify-between px-3 sm:px-4 py-2.5 sm:py-3 w-full">
                            <div className="flex items-center gap-2 sm:gap-3">
                                <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="p-1.5 rounded-lg hover:bg-white/10 lg:hidden">
                                    <Icon.Menu c="w-5 h-5" />
                                </button>
                                <img src={LOGO_URL} alt="Logo" className="w-7 h-7 sm:w-8 sm:h-8 rounded-lg object-contain bg-white p-0.5" />
                                <div>
                                    <div className="font-extrabold text-[10px] sm:text-sm tracking-wide">SMART WORKSITE</div>
                                    <div className="flex items-center gap-1 sm:gap-1.5">
                                        <div className="w-1 h-1 sm:w-1.5 sm:h-1.5 bg-emerald-400 rounded-full animate-pulse"></div>
                                        <span className="text-emerald-400 text-[8px] sm:text-[10px] font-semibold">Enterprise AI V.7</span>
                                    </div>
                                </div>
                            </div>
                            <div className="flex items-center gap-2 sm:gap-2.5">
                                {/* ปุ่มเปลี่ยนภาษาใช้งานได้จริง 4 ภาษา */}
                                <div className="relative">
                                    <button onClick={toggleLangMenu} className="bg-slate-800 text-white border border-slate-700 px-2 py-1 text-[9px] sm:text-[11px] font-bold rounded-lg hover:bg-slate-700 active:scale-95 transition-all flex items-center gap-1 min-h-[28px] sm:min-h-[30px]">
                                        🌐 {currentLang}
                                    </button>
                                    {showLangMenu && (
                                        <div className="absolute right-0 mt-1.5 bg-slate-800 border border-slate-700 rounded-xl overflow-hidden w-28 shadow-2xl z-[120]">
                                            <button onClick={() => selectLanguage('TH')} className="w-full text-left px-3 py-2 text-[10px] sm:text-xs text-white hover:bg-slate-700 transition-colors">🇹🇭 ภาษาไทย</button>
                                            <button onClick={() => selectLanguage('EN')} className="w-full text-left px-3 py-2 text-[10px] sm:text-xs text-white hover:bg-slate-700 transition-colors">🇺🇸 English</button>
                                            <button onClick={() => selectLanguage('MY')} className="w-full text-left px-3 py-2 text-[10px] sm:text-xs text-white hover:bg-slate-700 transition-colors">🇲🇲 မြန်မာ</button>
                                            <button onClick={() => selectLanguage('KH')} className="w-full text-left px-3 py-2 text-[10px] sm:text-xs text-white hover:bg-slate-700 transition-colors">🇰🇭 ភាសាខ្មែរ</button>
                                        </div>
                                    )}
                                </div>
                                {/* ปุ่มกระดิ่งตรวจสอบข้อผิดพลาดจากไลน์กลุ่ม */}
                                <button onClick={clickBellNotifications} className="relative text-slate-400 hover:text-white p-1.5 rounded-lg hover:bg-white/10 hidden sm:flex items-center justify-center min-h-[32px]">
                                    <Icon.Bell c="w-5 h-5" />
                                    {showBellDot && <div className="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full animate-ping"></div>}
                                </button>
                                <div className={`w-7 h-7 sm:w-8 sm:h-8 rounded-full flex items-center justify-center text-[10px] sm:text-xs font-bold shrink-0 ${isAdmin ? 'bg-amber-500 ring-2 ring-amber-300' : 'bg-indigo-500'}`} title={userEmail}>
                                    {initials}
                                </div>
                            </div>
                        </div>

                        {isMobileMenuOpen && (
                            <div className="bg-slate-800 border-t border-slate-700 px-4 py-2 flex flex-col gap-1 lg:hidden animate-fade-in w-full">
                                {systemMenus.map(m => (
                                    <button key={m.id} onClick={() => handleTabChange(m.id)}
                                        className={`flex items-center gap-3 px-3 py-2.5 rounded-xl text-xs sm:text-sm font-medium transition-all w-full text-left ${activeTab===m.id ? 'bg-white/10 text-white' : 'text-slate-300 hover:bg-white/5'}`}>
                                        <span className={m.color}>{m.icon}</span>
                                        {m.label}
                                        {m.adminOnly && !isAdmin && <Icon.Lock c="w-3 h-3 text-slate-500 ml-auto" />}
                                    </button>
                                ))}
                                <button onClick={() => window.open('?page=manual', '_blank')} className="flex items-center gap-3 px-3 py-2.5 rounded-xl text-xs sm:text-sm font-medium transition-all w-full text-left text-teal-300 hover:bg-white/5">
                                    <Icon.BookOpen c="w-4.5 h-4.5 text-teal-400" /> {t('manual')}
                                </button>
                                <button onClick={clickBellNotifications} className="flex items-center gap-3 px-3 py-2.5 rounded-xl text-xs sm:text-sm font-medium transition-all w-full text-left text-rose-300 hover:bg-white/5 sm:hidden">
                                    <Icon.Bell c="w-4.5 h-4.5 text-rose-400" /> แจ้งเตือนข้อผิดพลาด
                                    {showBellDot && <span className="ml-auto w-2 h-2 bg-red-500 rounded-full"></span>}
                                </button>
                            </div>
                        )}
                    </header>

                    <div className="flex flex-1 max-w-7xl mx-auto w-full relative">
                        {/* ========== SIDEBAR (desktop) ========== */}
                        <aside className="hidden lg:flex flex-col w-64 h-[calc(100vh-60px)] bg-white border-r border-slate-200 shadow-sm sticky top-[60px] pt-6 px-4 gap-1.5 overflow-y-auto shrink-0">
                            <div className="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest px-2 mb-3">เมนูหลัก</div>
                            {systemMenus.map(m => (
                                <button key={m.id} onClick={() => handleTabChange(m.id)}
                                    className={`flex items-center gap-3 px-4 py-3 rounded-xl text-xs font-bold transition-all text-left ${activeTab===m.id ? `${m.bg} ${m.color}` : 'text-slate-600 hover:bg-slate-50 border border-transparent hover:border-slate-200'}`}>
                                    <span className={activeTab===m.id ? m.color : 'text-slate-400'}>{m.icon}</span>
                                    {m.label}
                                    {m.adminOnly && !isAdmin && <Icon.Lock c="w-3 h-3 text-slate-300 ml-auto" />}
                                </button>
                            ))}
                            
                            <div className="flex-1"></div>

                            {/* --- ปุ่มคู่มือการใช้งาน (Manual Button) --- */}
                            <a 
                                href="?page=manual" 
                                target="_blank" 
                                rel="noopener noreferrer"
                                className="mt-4 mb-2 bg-[#0056b3] hover:bg-[#004494] text-white py-3 px-4 rounded-xl font-bold text-xs text-center transition-colors shadow-md flex items-center justify-center gap-2"
                            >
                                📖 {t('manual')}
                            </a>

                            <div className="mb-4 px-3 py-3 bg-slate-50 rounded-xl border border-slate-100 w-full overflow-hidden">
                                <div className="text-[10px] text-slate-400 font-semibold mb-0.5">ผู้ใช้งาน</div>
                                <div className="text-xs text-slate-600 truncate font-semibold w-full" title={userEmail}>{userEmail}</div>
                                {isAdmin && <div className="text-[10px] text-amber-600 font-bold mt-1">👑 Admin</div>}
                            </div>
                        </aside>

                        {/* ========== MAIN CONTENT ========== */}
                        <main className="flex-1 p-3 sm:p-4 lg:p-8 w-full max-w-full overflow-x-hidden">
                            {activeTab === 'dashboard' && <DashboardTab employees={employees} dailyReports={dailyReports} safetyHistory={safetyHistory} stats={stats} setActiveTab={handleTabChange} isAdmin={isAdmin} userEmail={userEmail} showNotification={showNotification} t={t} />}
                            {activeTab === 'app' && <AppTab employees={employees} dailyReports={dailyReports} setDailyReports={setDailyReports} showNotification={showNotification} setActiveTab={handleTabChange} isAdmin={isAdmin} dropdownData={dropdownData} t={t} />}
                            {activeTab === 'ai-tools' && <AiToolsTab showNotification={showNotification} />}
                            {activeTab === 'ai-admin' && <AiAdminTab isAdmin={isAdmin} userEmail={userEmail} showNotification={showNotification} />}
                            {activeTab === 'stats' && <StatsTab dailyReports={dailyReports} safetyHistory={safetyHistory} stats={stats} />}
                            {activeTab === 'archive' && <ArchiveTab dailyReports={dailyReports} setDailyReports={setDailyReports} showNotification={showNotification} />}
                            {activeTab === 'admin' && <AdminTab employees={employees} setEmployees={setEmployees} isAdmin={isAdmin} showNotification={showNotification} />}
                        </main>
                    </div>

                    {/* ========== BOTTOM NAV (mobile) ========== */}
                    <nav className="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-40 flex pb-safe w-full overflow-x-auto">
                        {systemMenus.slice(0,5).map(m => (
                            <button key={m.id} onClick={() => handleTabChange(m.id)}
                                className={`flex-1 flex flex-col items-center justify-center py-2 sm:py-3 gap-1 transition-all min-w-[70px] ${activeTab===m.id ? m.color : 'text-slate-400'}`}>
                                <span className={`${activeTab===m.id ? 'scale-110' : ''} transition-transform`}>{m.icon}</span>
                                <span className="text-[9px] font-bold truncate px-1 max-w-full">{m.label}</span>
                            </button>
                        ))}
                    </nav>

                    {/* ========== ปุ่มลอย AI Chat ทั่วทั้งระบบ ========== */}
                    <FloatingAIChat isAdmin={isAdmin} userEmail={userEmail} showNotification={showNotification} t={t} />

                    {/* ========== MODAL: ERROR REPORT LOGS (🔔 Notification Bell) ========== */}
                    {showBellModal && (
                        <div className="fixed inset-0 z-[200] bg-slate-900/50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl w-full max-w-md overflow-hidden shadow-2xl animate-fade-in border border-slate-100">
                                <div className="bg-rose-900 text-white px-4 py-3 flex items-center justify-between">
                                    <div className="flex items-center gap-2">
                                        <Icon.Bell c="w-4 h-4 text-rose-300" />
                                        <span className="font-bold text-xs sm:text-sm">🚨 ล็อกรายงานข้อผิดพลาดหน้างาน</span>
                                    </div>
                                    <button onClick={() => setShowBellModal(false)} className="text-white/80 hover:text-white"><Icon.X c="w-4.5 h-4.5" /></button>
                                </div>
                                <div className="p-4 space-y-3">
                                    <p className="text-[10px] text-slate-500 font-medium">รายงานความผิดพลาดที่เกิดขึ้นจริงจากกลุ่มไลน์</p>
                                    <div className="space-y-2 max-h-[220px] overflow-y-auto pr-1">
                                        {bellLogs.map((log, i) => (
                                            <div key={i} className="p-2.5 bg-rose-50/50 border border-rose-100 rounded-lg text-[10px] sm:text-xs">
                                                <div className="flex justify-between font-bold text-rose-900 mb-0.5">
                                                    <span>[{log.type}]</span>
                                                    <span>{log.timestamp}</span>
                                                </div>
                                                <p className="text-rose-700 leading-relaxed">{log.message}</p>
                                            </div>
                                        ))}
                                    </div>
                                    <button onClick={() => setShowBellModal(false)} className="w-full bg-slate-900 text-white text-xs py-2.5 rounded-xl font-bold">รับทราบและปิดรายงาน</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ========== TOAST NOTIFICATION ========== */}
                    {notification && (
                        <div className={`fixed bottom-20 lg:bottom-10 left-1/2 -translate-x-1/2 z-[250] px-4 sm:px-5 py-2.5 sm:py-3 rounded-2xl shadow-2xl text-white text-xs sm:text-sm font-bold flex items-center gap-2 sm:gap-3 transition-all w-max max-w-[90%] text-center border ${notification.type === 'error' ? 'bg-rose-600 border-rose-500' : 'bg-slate-900 border-slate-700'}`}>
                            {notification.type === 'error' ? '⚠️' : '✅'} {notification.msg}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
