        button,

        .spinner {

        @keyframes spin {
            0% {

            }

            100% {
                transform: rotate(360deg)
            }
        }

        .pulse-mic {

            0% {

        }

        .scrollbar-hide::-webkit-scrollbar {

        }

        .scrollbar-hide {

            scrollbar-width: none;
        }

        .stat-slide {

        const GAS_WEB_APP_URL = 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE';

        export const auditLogHistory = [];

            window.dispatchEvent(new CustomEvent('syncProgressUpdated', { detail: progress }));

        export const createSystemSnapshot = () => {
            const snapshot = {
                timestamp: new Date().toISOString(),
                employees: MOCK_DATA_FILE,
                logs: [...auditLogHistory],
                version: '1.0'
            };
            systemSnapshots.push(snapshot);

            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(snapshot, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "system_snapshot_" + Date.now() + ".json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();

            return snapshot;
        };

        export const syncToGAS = async (logData) => {
            try {
                const payload = {
                    timestamp: new Date().toISOString(),
                    action: logData.action,
                    module: logData.module,
                    user: logData.user,
                    data: JSON.stringify(logData.data),
                    rollbackCommand: JSON.stringify({
                        type: 'ROLLBACK',
                        targetAction: logData.action,
                        timestampId: Date.now(),
                        previousState: {}
                    })
                };

                auditLogHistory.unshift(payload);
                window.dispatchEvent(new Event('auditLogUpdated'));

                if (GAS_WEB_APP_URL.includes('YOUR_GOOGLE_APPS_SCRIPT_URL_HERE')) {
                    console.log('👷‍♂️ [Audit Log - Mock Mode] Saved to local memory:', payload);
                    return true;
                }

                await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                    mode: 'no-cors'
                });

                return true;
            } catch (error) {
                console.error('❌ [Audit Log] Failed to sync with GAS:', error);
                return false;
            }

                    let diff = (outH + outM / 60) - (inH + inM / 60);
                    if (diff < 0) diff += 24;

                    let workHours = diff >= 5 ? diff - 1 : diff;
                    let normal = 0;
                    let ot = 0;

                    if (workHours > 8) {
                        normal = 8;
                        ot = workHours - 8;
                    } else {
                        normal = workHours > 0 ? workHours : 0;
                        ot = 0;
                    }

                    setNormalHours(Number.isInteger(normal) ? normal.toString() : normal.toFixed(1));
                    setOtHours(ot > 0 ? (Number.isInteger(ot) ? ot.toString() : ot.toFixed(1)) : '0');
