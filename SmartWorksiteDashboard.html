    <style>
        body { font-family: 'Sarabun', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background-color: #f8fafc; }
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
        .pulse-mic { animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red {
            0%{transform:scale(0.95);box-shadow:0 0 0 0 rgba(239,68,68,0.7)}
            70%{transform:scale(1);box-shadow:0 0 0 10px rgba(239,68,68,0)}
            100%{transform:scale(0.95);box-shadow:0 0 0 0 rgba(239,68,68,0)}
        }
        .laser-sweep { position:absolute;width:100%;height:4px;background:linear-gradient(180deg,rgba(16,185,129,0) 0%,rgba(16,185,129,1) 50%,rgba(16,185,129,0) 100%);animation:sweep 2s ease-in-out infinite;box-shadow:0 0 12px rgba(16,185,129,0.8); }
        @keyframes sweep { 0%{top:0%} 50%{top:100%} 100%{top:0%} }
        .scrollbar-hide::-webkit-scrollbar { display:none; }
        .scrollbar-hide { -ms-overflow-style:none; scrollbar-width:none; }
        /* Stat Slider */
        .stat-slide { min-width: 160px; flex-shrink: 0; }
        /* Chatbot chat bubble */
        .chat-bubble-ai { background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%); color: white; border-radius: 0 16px 16px 16px; padding: 12px 14px; max-width: 85%; font-size: 14px; line-height: 1.5; }
        .chat-bubble-user { background: #f1f5f9; color: #334155; border-radius: 16px 0 16px 16px; padding: 12px 14px; max-width: 85%; font-size: 14px; line-height: 1.5; }
        /* Chatbot typing animation */
        .typing-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.7); animation: typing 1.2s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-8px)} }
        /* Fast Track pulse button */
        .fast-track-active { animation: ft-pulse 2s ease-in-out infinite; }
        @keyframes ft-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(99,102,241,0.4)} 50%{box-shadow:0 0 0 8px rgba(99,102,241,0)} }
        /* AI Tool card hover */
        .ai-tool-card { transition: transform 0.2s, box-shadow 0.2s; }
        .ai-tool-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
    </style>

        // ============================================================

        // ============================================================
        function StatSlider({ stats, activeEmployeeCount, activeSitesCount }) {

                },

                                <div className="text-2xl font-bold">{s.value}<span className="text-sm font-medium ml-1 opacity-80">{s.unit}</span></div>
                                <div className="text-sm font-semibold opacity-90">{s.label}</div>

                            </div>
                        ))}
                    </div>
                    <div className="text-center text-xs text-slate-400">← เลื่อนดูสถิติเพิ่มเติม →</div>
                </div>

        }

        // ============================================================
        // COMPONENT: InlineChatbot — แชทบอท AI ฝังใน Dashboard
        // Header ใช้ p5.js instance mode: วงแหวน 3 ชั้น HSB หมุน
        // (ตาม sketch ที่ user ส่งมา: layered arc rings + pulse sine)
        // ============================================================
        function InlineChatbot({ isAdmin, userEmail, showNotification }) {
            const [messages, setMessages] = useState([
                {
                    id: 1,
                    role: 'ai',
                    text: 'สวัสดีครับพี่ 👋 ผมเป็นผู้ช่วยอัจฉริยะวิเคราะห์ความปลอดภัย กำลังคน และไซต์งานประจำระบบนี้ มีอะไรให้ผมรับใช้หน้างานครับ?'
                }
            ]);
            const [inputMsg, setInputMsg] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [isExpanded, setIsExpanded] = useState(false);
            const messagesEndRef = useRef(null);

            // p5.js instance mode refs
            const p5ContainerRef = useRef(null);
            const p5InstanceRef  = useRef(null);

            // Auto-scroll เมื่อมีข้อความใหม่
            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages, isTyping]);

            useEffect(() => {
                if (!p5ContainerRef.current || typeof window.p5 === 'undefined') return;

                const sketch = (p) => {
                    p.setup = () => {
                        const w = p5ContainerRef.current?.offsetWidth || 390;
                        const canvas = p.createCanvas(w, 72);
                        canvas.parent(p5ContainerRef.current);
                        canvas.style('display', 'block');
                        p.colorMode(p.HSB, 360, 100, 100);
                        p.noFill();
                        p.strokeCap(p.SQUARE);
                    };

                    p.draw = () => {
                        p.clear();
                        p.translate(p.width / 2, p.height / 2);

                        const t = p.millis();
                        const baseRotation = t * 0.0015;
                        const layerCount = 3;

                        for (let i = 0; i < layerCount; i++) {
                            p.push();
                            const phase = i * (p.TWO_PI / layerCount);
                            const pulse = p.sin(t * 0.002 + phase);
                            p.rotate(baseRotation + (i * 0.5) + (pulse * 0.5));

                            const diameter = 90 - (i * 22);
                            const hue      = (t * 0.08 + (i * 40)) % 360;
                            const weight   = 10 + (i * 3);

                            const arcStart = p.map(p.cos(t * 0.001 + phase), -1, 1, 0, p.PI);
                            const arcEnd   = arcStart + p.PI * 0.8;

                            p.stroke(hue, 85, 100);
                            p.strokeWeight(weight);
                            p.arc(0, 0, diameter, diameter, arcStart, arcEnd);
                            p.pop();
                        }
                    };

                    p.windowResized = () => {
                        if (p5ContainerRef.current) {
                            p.resizeCanvas(p5ContainerRef.current.offsetWidth, 72);
                        }
                    };
                };

                p5InstanceRef.current = new window.p5(sketch);

                return () => {
                    if (p5InstanceRef.current) {
                        p5InstanceRef.current.remove();
                        p5InstanceRef.current = null;
                    }
                };
            }, []);

            const sendChatMessage = () => {
                if (!inputMsg.trim()) return;
                const userMsg = { id: Date.now(), role: 'user', text: inputMsg };
                setMessages(prev => [...prev, userMsg]);
                setInputMsg('');
                setIsTyping(true);

                if (typeof google !== 'undefined' && google.script && google.script.run) {
                    google.script.run
                        .withSuccessHandler(reply => {

            const [isRecording, setIsRecording] = useState(false);

            const hour = now.getHours();
            const isOtTime = hour >= 17;

            const processFastTrackAI = () => {
                if (!fastText.trim()) {
                    showNotification('กรุณาพิมพ์ข้อความก่อนประมวลผลครับ', 'error');

                setTimeout(() => {
                    setIsProcessing(false);

                    onProcessed && onProcessed({ success: true });
                    onClose();
                }, 2000);
            };

            const handleMic = () => {
                if (!isRecording) {
                    setIsRecording(true);

                    setTimeout(() => {
                        setIsRecording(false);
                        setFastText('ช่างบอย กับ ช่างอ้น เข้าไซต์บางนา เลิกงานทุ่มครึ่ง โอทีสามชั่วโมง');
                        showNotification('✅ แปลงเสียงเป็นข้อความสำเร็จ!', 'success');
                    }, 3000);

                    setIsRecording(false);
                }

            return (
                <div className="bg-white rounded-2xl shadow-sm border-2 border-indigo-300 overflow-hidden">
                    <div className="bg-gradient-to-r from-indigo-600 to-violet-600 px-4 py-3 flex items-center justify-between">

                            <span className="text-amber-600 text-sm">✨</span>
                            <span className="text-amber-700 text-xs font-medium">ตอนนี้หลัง 17:00 น. — ระบบจะคำนวณ OT อัตโนมัติ</span>
                        </div>
                    )}

                    <div className="p-4 space-y-3">
                        <div className="relative">
                            <textarea
                                value={fastText}
                                onChange={e => setFastText(e.target.value)}
                                rows={4}

                                className="w-full rounded-xl border border-slate-200 bg-slate-50 px-3 py-2.5 text-sm text-slate-700 placeholder-slate-400 italic focus:outline-none focus:border-indigo-400 focus:bg-white resize-none transition-all"
                            />
                            <button
                                onClick={handleMic}
                                className={`absolute bottom-3 right-3 p-1.5 rounded-lg transition-all ${isRecording ? 'bg-red-100 text-red-500 pulse-mic' : 'bg-indigo-50 text-indigo-400 hover:text-indigo-600'}`}
                            >
                                <Icon.Mic c="w-4 h-4" />
                            </button>
                        </div>

                        <button
                            onClick={processFastTrackAI}
                            disabled={!fastText.trim() || isProcessing}
                            className="w-full py-2.5 rounded-xl font-semibold text-sm transition-all flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-200 disabled:text-slate-400 text-white shadow-md hover:shadow-lg"
                        >
                            {isProcessing ? (
                                <><div className="spinner" style={{width:'16px',height:'16px',borderTopColor:'white'}}></div> กำลังประมวลผล...</>

                                <><Icon.Sparkles c="w-4 h-4" /> ประมวลผลด้วย AI ✨</>

                            <div className="flex items-start gap-2">
                                <span className="text-blue-600 text-sm mt-0.5">📢</span>
                                <div className="flex-1">
                                    <div className="text-blue-800 font-semibold text-xs mb-1">ประกาศสั่งงานและเซฟตี้วันนี้</div>
                                    <div className="text-blue-700 text-xs leading-relaxed">

                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

        // COMPONENT: AppTab — แอพลงเวลา AI (เชื่อมต่อระบบเซิร์ฟเวอร์จริง)
        // ============================================================
        function AppTab({ employees, dailyReports, setDailyReports, showNotification }) {
            const activeEmployees = employees.filter(e => e.K === 'ปกติ');
            const residenceGroups = [...new Set(activeEmployees.map(e => e.J).filter(Boolean))].sort();

            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [site, setSite] = useState('');
            const [group, setGroup] = useState('');
            const [timeIn, setTimeIn] = useState('08:00');
            const [timeOut, setTimeOut] = useState('17:00');
            const [workH, setWorkH] = useState('8');
            const [otH, setOtH] = useState('0');
            const [selected, setSelected] = useState([]);
            const [inputText, setInputText] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [isRecording, setIsRecording] = useState(false);

            useEffect(() => {
                if (timeIn && timeOut) {
                    const [iH,iM] = timeIn.split(':').map(Number);
                    const [oH,oM] = timeOut.split(':').map(Number);
                    let total = (oH + oM/60) - (iH + iM/60);
                    if (total < 0) total += 24;
                    if (total > 0) {
                        let net = total >= 5 ? total - 1 : total;
                        let ot = 0, norm = net;
                        if (oH >= 17 && iH < 17) { ot = (oH + oM/60) - 17; norm = net - ot; }
                        else if (net > 8) { ot = net - 8; norm = 8; }
                        const r = n => Math.round(n*2)/2;
                        setWorkH(r(Math.max(0,norm)).toString());
                        setOtH(r(Math.max(0,ot)).toString());
                    }
                }
            }, [timeIn, timeOut]);

            const filteredEmp = group ? activeEmployees.filter(e => e.J === group) : activeEmployees;

            const toggleEmp = id => setSelected(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev, id]);
            const selectAll = () => setSelected(selected.length === filteredEmp.length ? [] : filteredEmp.map(e=>e.N));

            // ✨ ปรับปรุงลอจิกการบันทึกข้อมูลเพื่อส่งขึ้นฐานข้อมูล Google Sheets จริง
            const save = (e) => {
                e.preventDefault();
                if (!date || !site || selected.length === 0) {
                    showNotification('กรุณาเลือกไซต์งานและพนักงานก่อนบันทึก', 'error'); return;
                }
                
                const selectedNamesArray = selected.map(id => {
                    const emp = activeEmployees.find(e => e.N === id);
                    return emp ? emp.E : id;
                });

                const payload = {
                    date: date,
                    site: site,
                    normalHour: Number(workH),
                    otTotal: Number(otH),
                    employees: selectedNamesArray
                };

                if (typeof google !== 'undefined' && google.script && google.script.run) {
                    showNotification('⏳ กำลังจัดทำรายการส่งข้อมูลเข้าสู่ตารางฐานข้อมูล...', 'success');
                    
                    google.script.run
                        .withSuccessHandler((response) => {
                            if (response.success) {
                                showNotification(`✅ ${response.message}`, 'success');
                                setDailyReports(prev => [{
                                    id: Date.now(), date, site, timeIn, timeOut,
                                    normalHour: Number(workH), otTotal: Number(otH),
                                    employeesCount: selected.length, names: selectedNamesArray.join(', ')
                                }, ...prev]);
                                setSelected([]);
                            } else {
                                showNotification(`❌ ไม่สามารถทำการบันทึกได้: ${response.message}`, 'error');
                            }
                        })
                        .withFailureHandler((error) => {
                            showNotification(`❌ เครือข่ายระบบขัดข้อง: ${error.message}`, 'error');
                        })
                        .saveDailyReport(payload);
                } else {
                    const names = selectedNamesArray.join(', ');
                    setDailyReports(prev => [{
                        id: Date.now(), date, site, timeIn, timeOut,
                        normalHour: Number(workH), otTotal: Number(otH),
                        employeesCount: selected.length, names

                            value={inputText}

                                <Icon.Mic c="w-4 h-4" /> {isRecording ? 'กำลังฟัง...' : 'พูด'}
                            </button>
                            <button onClick={processAI} disabled={isLoading}
                                className="flex-1 bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-200 text-white py-2 rounded-xl font-semibold text-sm flex items-center justify-center gap-2 transition-all">
                                {isLoading ? <><div className="spinner" style={{width:'14px',height:'14px',borderTopColor:'white'}}></div> ประมวลผล...</> : <><Icon.Sparkles c="w-4 h-4" /> ประมวลผล AI</>}
                            </button>
                        </div>
                    </div>

                    <form onSubmit={save} className="bg-white rounded-2xl border border-slate-100 shadow-sm p-4 space-y-3">

        // ============================================================
        // COMPONENT: ArchiveTab — คลังข้อมูลรายงาน
        // ============================================================
        function ArchiveTab({ dailyReports, setDailyReports, showNotification }) {
            const [search, setSearch] = useState('');
            const filtered = dailyReports.filter(r =>
                r.names.toLowerCase().includes(search.toLowerCase()) ||
                r.site.toLowerCase().includes(search.toLowerCase())
            );

            const exportCSV = () => {
                let csv = "\uFEFFลำดับ,วันที่,ไซต์งาน,เวลาเข้า,เวลาออก,ชั่วโมงปกติ,OT,จำนวนคน,รายชื่อ\r\n";
                dailyReports.forEach((r,i) => {
                    csv += [i+1, r.date, `"${r.site}"`, r.timeIn, r.timeOut, r.normalHour, r.otTotal, r.employeesCount, `"${r.names}"`].join(',') + '\r\n';
                });
                const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `รายงาน_${new Date().toISOString().split('T')[0]}.csv`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                showNotification('📥 ดาวน์โหลด CSV สำเร็จ!', 'success');
            };

            return (
                <div className="space-y-4 pb-6">
                    <div className="flex items-center justify-between">
                        <h2 className="text-xl font-extrabold text-slate-800">🗄️ คลังข้อมูล</h2>
                        <button onClick={exportCSV} className="bg-emerald-600 text-white text-xs font-semibold px-3 py-2 rounded-xl flex items-center gap-1.5 hover:bg-emerald-700 transition-all">
                            <Icon.Download c="w-3.5 h-3.5" /> Export CSV
                        </button>
                    </div>
                    <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="ค้นหาชื่อหรือไซต์งาน..."
                        className="w-full rounded-xl border border-slate-200 px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-400 bg-white" />
                    <div className="space-y-2">
                        {filtered.length === 0 && <div className="text-center text-slate-400 py-8 text-sm">ไม่พบข้อมูล</div>}
                        {filtered.map(r => (
                            <div key={r.id} className="bg-white rounded-xl border border-slate-100 p-3 flex items-start gap-3 shadow-sm">
                                <div className="bg-indigo-50 text-indigo-600 rounded-lg p-2"><Icon.Clock c="w-4 h-4" /></div>
                                <div className="flex-1">
                                    <div className="font-bold text-slate-700 text-sm">{r.site} — {r.date}</div>
                                    <div className="text-xs text-slate-500 mt-0.5">{r.timeIn} - {r.timeOut} | {r.employeesCount} คน {r.otTotal > 0 && <span className="text-orange-500 font-medium">OT {r.otTotal}ชม.</span>}</div>
                                    <div className="text-xs text-slate-400 mt-0.5 truncate">{r.names}</div>
                                </div>
                                <button onClick={() => { if(confirm('ลบรายการนี้?')) { setDailyReports(prev=>prev.filter(x=>x.id!==r.id)); showNotification('ลบเรียบร้อย','error'); } }}
                                    className="text-red-400 hover:text-red-600 p-1 transition-colors">
                                    <Icon.Trash c="w-4 h-4" />
                                </button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // ============================================================
        // COMPONENT: AdminTab — จัดการพนักงาน (CRUD)
        // ============================================================
        function AdminTab({ employees, setEmployees, isAdmin, showNotification }) {
            const [showAdd, setShowAdd] = useState(false);
            const [form, setForm] = useState({B:'นาย',C:'',D:'',J:'',K:'ปกติ',N:''});
            const [search, setSearch] = useState('');

            if (!isAdmin) {
                return (
                    <div className="flex flex-col items-center justify-center py-16 space-y-4">
                        <Icon.Lock c="w-16 h-16 text-slate-300" />
                        <p className="text-slate-400 text-sm">เฉพาะ Admin เท่านั้น</p>
                    </div>
                );
            }

            const addEmp = (e) => {
                e.preventDefault();
                if (!form.C || !form.D || !form.N) { showNotification('กรอกข้อมูลให้ครบ','error'); return; }
                if (employees.some(x=>x.N===form.N)) { showNotification('รหัสซ้ำในระบบ','error'); return; }
                setEmployees(prev => [...prev, {...form, A:prev.length+2, E:`${form.B} ${form.C} ${form.D}`}]);
                showNotification(`เพิ่ม ${form.C} ${form.D} สำเร็จ`);
                setForm({B:'นาย',C:'',D:'',J:'',K:'ปกติ',N:''}); setShowAdd(false);
            };

            const filtered = employees.filter(e =>
                e.E?.toLowerCase().includes(search.toLowerCase()) || e.N?.includes(search)
            );

            return (
                <div className="space-y-4 pb-6">
                    <div className="flex items-center justify-between">
                        <h2 className="text-xl font-extrabold text-slate-800">👤 จัดการพนักงาน</h2>
                        <button onClick={()=>setShowAdd(!showAdd)} className={`text-xs font-semibold px-3 py-2 rounded-xl transition-all ${showAdd ? 'bg-slate-200 text-slate-600' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}>
                            {showAdd ? '✕ ยกเลิก' : '+ เพิ่มพนักงาน'}
                        </button>
                    </div>

                    {showAdd && (
                        <form onSubmit={addEmp} className="bg-indigo-50 rounded-2xl border border-indigo-200 p-4 space-y-3">
                            <div className="grid grid-cols-2 gap-3">
                                {[{l:'คำนำหน้า',k:'B',type:'select',opts:['นาย','นาง','น.ส.','ด.ช.','ด.ญ.']},
                                  {l:'ชื่อ',k:'C',type:'text'},{l:'นามสกุล',k:'D',type:'text'},
                                  {l:'แคมป์/ที่พัก',k:'J',type:'text'},{l:'รหัส 5 หลัก',k:'N',type:'text'},
                                  {l:'สถานะ',k:'K',type:'select',opts:['ปกติ','ลาออก']}].map(f => (
                                    <div key={f.k}>
                                        <label className="text-xs font-semibold text-slate-600 mb-1 block">{f.l}</label>
                                        {f.type === 'select'
                                            ? <select value={form[f.k]} onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))} className="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm focus:outline-none bg-white">{f.opts.map(o=><option key={o}>{o}</option>)}</select>
                                            : <input type="text" value={form[f.k]} onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))} className="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm focus:outline-none bg-white" />
                                        }
                                    </div>
                                ))}
                            </div>
                            <button type="submit" className="w-full bg-indigo-600 text-white py-2.5 rounded-xl font-bold text-sm hover:bg-indigo-700 transition-all">บันทึกพนักงานใหม่</button>
                        </form>
                    )}

                    <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="ค้นหาชื่อหรือรหัสพนักงาน..."
                        className="w-full rounded-xl border border-slate-200 px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-400 bg-white" />

                    <div className="space-y-2">
                        {filtered.map(emp => (
                            <div key={emp.N} className="bg-white rounded-xl border border-slate-100 p-3 flex items-center gap-3 shadow-sm">
                                <div className={`w-10 h-10 rounded-full flex-shrink-0 flex items-center justify-center text-sm font-bold ${emp.K==='ปกติ' ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-400'}`}>
                                    {emp.C?.[0]}
                                </div>
                                <div className="flex-1">
                                    <div className="font-bold text-slate-700 text-sm">{emp.E}</div>
                                    <div className="text-xs text-slate-400">รหัส: {emp.N} | แคมป์: {emp.J}</div>
                                </div>
                                <div className="flex items-center gap-1">
                                    <button onClick={() => { setEmployees(prev=>prev.map(e=>e.N===emp.N?{...e,K:e.K==='ปกติ'?'ลาออก':'ปกติ'}:e)); showNotification(`ปรับสถานะ ${emp.C} แล้ว`); }}
                                        className={`text-xs px-2 py-1 rounded-lg font-medium transition-all ${emp.K==='ปกติ' ? 'bg-emerald-100 text-emerald-700 hover:bg-emerald-200' : 'bg-red-100 text-red-500 hover:bg-red-200'}`}>
                                        {emp.K}
                                    </button>
                                    <button onClick={() => { if(confirm(`ลบ ${emp.E}?`)) { setEmployees(prev=>prev.filter(e=>e.N!==emp.N)); showNotification('ลบเรียบร้อย','error'); } }}
                                        className="text-red-400 hover:text-red-600 p-1 ml-1 transition-colors">
                                        <Icon.Trash c="w-4 h-4" />
                                    </button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

                    console.warn('gas-data-bridge init error:', err);

                    {/* ========== HEADER ========== */}
                    <header className="bg-slate-900 text-white sticky top-0 z-50 shadow-xl">
                        <div className="flex items-center justify-between px-4 py-3">
                            <div className="flex items-center gap-3">
                                <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="p-1.5 rounded-lg hover:bg-white/10 transition-colors lg:hidden">
                                    <Icon.Menu c="w-5 h-5" />
                                </button>
                                <img src={LOGO_URL} alt="Logo" className="w-8 h-8 rounded-lg object-cover" onError={e=>{e.target.style.display='none'}} />
                                <div>
                                    <div className="font-extrabold text-sm tracking-wide">SMART WORKSITE</div>
                                    <div className="flex items-center gap-1.5">
                                        <div className="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></div>
                                        <span className="text-emerald-400 text-[10px] font-semibold">Enterprise AI V.6</span>
                                    </div>
                                </div>
                            </div>
                            <div className="flex items-center gap-2.5">
                                <button className="relative text-slate-400 hover:text-white p-1.5 rounded-lg hover:bg-white/10 transition-colors">
                                    <Icon.Bell c="w-5 h-5" />
                                    <div className="absolute top-0.5 right-0.5 w-2 h-2 bg-red-500 rounded-full"></div>
                                </button>
                                <button className="text-slate-400 hover:text-white p-1.5 rounded-lg hover:bg-white/10 transition-colors">
                                    <Icon.Gear c="w-5 h-5" />
                                </button>
                                <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold ${isAdmin ? 'bg-amber-500 ring-2 ring-amber-300' : 'bg-indigo-500'}`} title={userEmail}>
                                    {initials}
                                </div>
                            </div>
                        </div>

                        {isMobileMenuOpen && (
                            <div className="bg-slate-800 border-t border-slate-700 px-4 py-2 flex flex-col gap-1">
                                {systemMenus.map(m => (
                                    <button key={m.id} onClick={() => handleTabChange(m.id)}
                                        className={`flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all ${activeTab===m.id ? 'bg-white/10 text-white' : 'text-slate-300 hover:bg-white/5'}`}>
                                        <span className={m.color}>{m.icon}</span>
                                        {m.label}
                                        {m.adminOnly && !isAdmin && <Icon.Lock c="w-3 h-3 text-slate-500 ml-auto" />}
                                    </button>
                                ))}
                            </div>
                        )}
                    </header>

                    <div className="flex max-w-5xl mx-auto">
                        {/* ========== SIDEBAR (desktop) ========== */}
                        <aside className="hidden lg:flex flex-col w-56 min-h-screen bg-white border-r border-slate-100 shadow-sm sticky top-[60px] h-screen pt-6 px-3 gap-1">
                            <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest px-2 mb-2">เมนูหลัก</div>
                            {systemMenus.map(m => (
                                <button key={m.id} onClick={() => handleTabChange(m.id)}
                                    className={`flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all text-left ${activeTab===m.id ? `${m.bg} ${m.color} font-bold` : 'text-slate-600 hover:bg-slate-50'}`}>
                                    <span className={activeTab===m.id ? m.color : 'text-slate-400'}>{m.icon}</span>
                                    {m.label}
                                    {m.adminOnly && !isAdmin && <Icon.Lock c="w-3 h-3 text-slate-300 ml-auto" />}
                                </button>
                            ))}
                            <div className="mt-auto mb-4 px-2 py-3 bg-slate-50 rounded-xl border border-slate-100">
                                <div className="text-[10px] text-slate-400 font-semibold mb-0.5">ผู้ใช้งาน</div>
                                <div className="text-xs text-slate-600 truncate">{userEmail}</div>
                                {isAdmin && <div className="text-[10px] text-amber-600 font-bold mt-0.5">👑 Admin</div>}
                            </div>
                        </aside>

                        {/* ========== MAIN CONTENT ========== */}
                        <main className="flex-1 p-4 lg:p-6 max-w-xl mx-auto w-full">
                            {activeTab === 'dashboard' && (
                                <DashboardTab employees={employees} dailyReports={dailyReports}
                                    safetyHistory={safetyHistory} stats={stats} setActiveTab={handleTabChange}
                                    isAdmin={isAdmin} userEmail={userEmail} showNotification={showNotification} />
                            )}
                            {activeTab === 'app' && (
                                <AppTab employees={employees} dailyReports={dailyReports}
                                    setDailyReports={setDailyReports} showNotification={showNotification} />
                            )}
                            {activeTab === 'ai-tools' && (
                                <AiToolsTab showNotification={showNotification} />
                            )}
                            {activeTab === 'ai-admin' && (
                                <AiAdminTab isAdmin={isAdmin} userEmail={userEmail} showNotification={showNotification} />
                            )}
                            {activeTab === 'stats' && (
                                <StatsTab dailyReports={dailyReports} safetyHistory={safetyHistory} stats={stats} />
                            )}
                            {activeTab === 'archive' && (
                                <ArchiveTab dailyReports={dailyReports} setDailyReports={setDailyReports} showNotification={showNotification} />
                            )}
                            {activeTab === 'admin' && (
                                <AdminTab employees={employees} setEmployees={setEmployees}
                                    isAdmin={isAdmin} showNotification={showNotification} />
                            )}
                        </main>
                    </div>

                    {/* ========== BOTTOM NAV (mobile) ========== */}
                    <nav className="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 shadow-xl z-40 flex">
                        {systemMenus.slice(0,5).map(m => (
                            <button key={m.id} onClick={() => handleTabChange(m.id)}
                                className={`flex-1 flex flex-col items-center justify-center py-2.5 gap-0.5 transition-all ${activeTab===m.id ? m.color : 'text-slate-400'}`}>
                                <span className={`${activeTab===m.id ? 'scale-110' : ''} transition-transform`}>{m.icon}</span>
                                <span className="text-[10px] font-medium">{m.label}</span>
                                {activeTab===m.id && <div className={`absolute bottom-0 w-6 h-0.5 ${m.bg.replace('bg-','bg-').replace('-50','-500')} rounded-full`}></div>}
                            </button>
                        ))}
                    </nav>

                    {/* ========== TOAST NOTIFICATION ========== */}
                    {notification && (
                        <div className={`fixed bottom-20 lg:bottom-6 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-2xl shadow-2xl text-white text-sm font-semibold flex items-center gap-2.5 transition-all max-w-xs text-center ${notification.type === 'error' ? 'bg-red-600' : 'bg-slate-900'}`}>
                            {notification.type === 'error' ? '⚠️' : '✅'} {notification.msg}
                        </div>
                    )}

                    <div className="h-20 lg:h-0"></div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
