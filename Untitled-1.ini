/**
 * ส่งข้อความธรรมดากลับไปยัง LINE
 */
function reply(tk, m) {
  try {
    const token = getDynamicConfig('Yu1j5ucXKG14T6o7IErbclwMDWCe82awaAvvUXYexvdLoSWU0v0sBoNXITE7uqgryUKRWwCoyi33wchRxo6rgdFdyy/wGTwrMotzLoOYQDW4Hal9xJJlpAbzmqr0cdEVIiFbPvO2z3CftpDeb+adiAdB04t89/1O/w1cDnyilFU=');
    if (!token) return;
    UrlFetchApp.fetch('https://api.line.me/v2/bot/message/reply', {
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      method: 'post',
      payload: JSON.stringify({ replyToken: tk, messages: [{ type: 'text', text: m }] }),
      muteHttpExceptions: true
    });
  } catch (e) {
    console.error("reply failed: " + e.message);
  }
}

/**
 * ส่งข้อความพร้อมปุ่มเลือก (Quick Reply) ไปยัง LINE
 */
function replyWithButtons(tk, t, b) {
  try {
    const LINE_TOKEN = getDynamicConfig('Yu1j5ucXKG14T6o7IErbclwMDWCe82awaAvvUXYexvdLoSWU0v0sBoNXITE7uqgryUKRWwCoyi33wchRxo6rgdFdyy/wGTwrMotzLoOYQDW4Hal9xJJlpAbzmqr0cdEVIiFbPvO2z3CftpDeb+adiAdB04t89/1O/w1cDnyilFU=');
    if (!LINE_TOKEN) throw new Error("Missing LINE_CHANNEL_ACCESS_TOKEN");

    const items = b.map(l => ({
      "type": "action",
      "action": { "type": "message", "label": l, "text": l }
    }));

    const payload = {
      replyToken: tk,
      messages: [{
        "type": "text",
        "text": t,
        "quickReply": { "items": items }
      }]
    };

    const response = UrlFetchApp.fetch("https://api.line.me/v2/bot/message/reply", {
      method: "post",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + LINE_TOKEN
      },
      payload: JSON.stringify(payload),
      muteHttpExceptions: true
    });

    const code = response.getResponseCode();
    if (code !== 200) {
      console.error(`LINE API Error (${code}): ${response.getContentText()}`);
    }
  } catch (e) {
    console.error("replyWithButtons failed: " + e.message);
  }
}

// =================================================================
// 🧠 CENTRAL BRAIN: Orchestrator & Dispatcher (Pure Synchronous)
// =================================================================

function doPost(e) {
  // ดักสัญญาณ Webhook Verification เพื่อป้องกัน Error ตอนเชื่อมต่อ LINE ครั้งแรก
  if (e && e.postData && e.postData.contents) {
    try {
      const preCheckData = JSON.parse(e.postData.contents);
      if (preCheckData.events && preCheckData.events.length === 0) {
        return ContentService.createTextOutput(JSON.stringify({ status: "success", message: "Webhook verified successfully" }))
                             .setMimeType(ContentService.MimeType.JSON);
      }
    } catch (parseErr) {
      // ข้ามไปประมวลผลหลักหากแกะ JSON ไม่สำเร็จ
    }
  }

  // 🔒 เริ่มระบบสิทธิ์ล็อกเพื่อป้องกันข้อมูลชนกันทางเทคนิค (Concurrency Control)
  const lock = LockService.getScriptLock();
  let globalReplyToken = null;
  
  try {
    lock.waitLock(30000); // รอคิวเข้าถึงทรัพยากรสูงสุด 30 วินาที
    
    if (!e || !e.postData || !e.postData.contents) {
      return ContentService.createTextOutput(JSON.stringify({ status: "ERROR", message: "No data received" }))
                           .setMimeType(ContentService.MimeType.JSON);
    }
    
    const requestData = JSON.parse(e.postData.contents);
    
    // 🎯 ท่อที่ 1: สัญญาณส่งมาจากระบบ LINE Webhook
    if (requestData.events && requestData.events.length > 0) {
      const event = requestData.events[0];
      if (event.replyToken) globalReplyToken = event.replyToken;
      
      handleLineWebhook(event);
      
      return ContentService.createTextOutput(JSON.stringify({ status: "success" }))
                           .setMimeType(ContentService.MimeType.JSON);
    }
    
    // 🎯 ท่อที่ 2: สัญญาณส่งมาจากหน้า Web App Portal / ระบบลงเวลาภายนอก
    if (requestData.source === "WEB_APP_PORTAL" || requestData.type === "SAVE") {
      if (typeof handleWebAppGateway === "function") {
        handleWebAppGateway(requestData);
        return ContentService.createTextOutput(JSON.stringify({ status: "success" }))
                             .setMimeType(ContentService.MimeType.JSON);
      }
    }
    
    return ContentService.createTextOutput(JSON.stringify({ status: "IGNORED" }))
                         .setMimeType(ContentService.MimeType.JSON);
                         
  } catch (err) {
    if (typeof logAuditTrail === "function") {
      logAuditTrail("SYSTEM_ERROR", "RUNTIME_EXCEPTION", e && e.postData ? e.postData.contents : "NO_CONTENT", "", 0.0, "ERROR", err.message);
    }
    
    if (globalReplyToken) {
      reply(globalReplyToken, "🔴 ระบบภายในขัดข้อง: " + err.message + "\n(กรุณาแจ้งแอดมินให้ตรวจสอบโค้ดจุดนี้)");
    }
    
    return ContentService.createTextOutput(JSON.stringify({ status: "success", error: err.message }))
                         .setMimeType(ContentService.MimeType.JSON);
  } finally {
    lock.releaseLock(); // 🔓 ปลดล็อกร้อยเปอร์เซ็นต์เสมอเพื่อป้องกัน Deadlock
  }
}

/**
 * ฟังก์ชันจัดการ LINE Webhook พร้อมระบบ Cache State Machine
 */
function handleLineWebhook(event) {
  const { replyToken, source, message } = event;
  const userId = source.userId;
  const groupId = source.groupId;

  // [GUARD CLAUSE 1]: ตรวจสอบสิทธิ์กลุ่ม (Whitelist)
  if (source.type === "group" && typeof isAllowedGroup === "function" && !isAllowedGroup(groupId)) {
    if (typeof logAuditTrail === "function") {
      logAuditTrail(userId, "BLOCKED_GROUP", `Group IDS: ${groupId} rejected.`, "REJECT", 1.0, "BLOCK", "บล็อกกลุ่มที่ไม่ได้รับอนุญาต");
    }
    return;
  }

  const adminId = typeof getDynamicConfig === "function" ? getDynamicConfig("ADMIN_LINE_IDS") : "";
  const adminList = (adminId || "").split(",").map(id => id.trim());
  const isUserAdmin = adminList.includes(userId) || (typeof isAdmin === "function" && isAdmin(userId));
  const systemStatus = typeof getDynamicConfig === "function" ? getDynamicConfig("SYSTEM_STATUS") : "ON";

  if (message.type === "text") {
    const msg = message.text.trim();

    // [GUARD CLAUSE 2]: ป้องกันช่างส่งรายงานทางแชทส่วนตัว (อนุญาตเฉพาะแอดมิน)
    if (source.type === "user" && !isUserAdmin) {
      reply(replyToken, "⚠️ ขออภัยครับ บอทรับลงรายงานเฉพาะใน 'ไลน์กลุ่ม' เท่านั้นครับ 🙏");
      return;
    }

    // ⚡ เช็คและประมวลผลระบบคงสถานะเก่า (State Machine)
    const cache = CacheService.getScriptCache();
    let pendingClockIn12 = cache.get(`PENDING_CLOCKIN_${userId}`);
    let pendingOTConfirm = cache.get(`PENDING_OT_CONFIRM_${userId}`);
    let pendingOTDetails = cache.get(`PENDING_OT_DETAILS_${userId}`);

    // หากพิมพ์ขึ้นต้นด้วย # ให้ทำการเคลียร์สถานะตอบกลับค้างคาเก่าทันที
    if (msg.startsWith("#") && (pendingClockIn12 || pendingOTConfirm || pendingOTDetails)) {
      cache.remove(`PENDING_CLOCKIN_${userId}`);
      cache.remove(`PENDING_OT_CONFIRM_${userId}`);
      cache.remove(`PENDING_OT_DETAILS_${userId}`);
      if (typeof logAuditTrail === "function") logAuditTrail(userId, "STATE_CLEAR", msg, "CLEARED", 1.0, "CLEAR", "ผู้ใช้เคลียร์สถานะเก่าด้วยเครื่องหมาย #");
      pendingClockIn12 = null; pendingOTConfirm = null; pendingOTDetails = null;
    }

    if (pendingOTDetails) {
      if (msg === "ยกเลิกลงเวลา") {
        cache.remove(`PENDING_OT_DETAILS_${userId}`);
        reply(replyToken, "❌ ยกเลิกเรียบร้อยครับ");
        return;
      }
      let dataToProcess = JSON.parse(pendingOTDetails);
      cache.remove(`PENDING_OT_DETAILS_${userId}`);
      if (typeof logAuditTrail === "function") logAuditTrail(userId, "PROCESS_OT_DETAILS", msg, JSON.stringify(dataToProcess), 1.0, "ACCEPT_DETAILS", "ประมวลผลรายละเอียดไซต์งานโอที");
      finalizeClockInSaving(dataToProcess, userId, replyToken, dataToProcess.checkStatus, msg);
      return;
    }

    if (pendingOTConfirm) {
      let dataToProcess = JSON.parse(pendingOTConfirm);
      if (msg === "ทำที่เดิม/งานเดิม") {
        cache.remove(`PENDING_OT_CONFIRM_${userId}`);
        if (typeof logAuditTrail === "function") logAuditTrail(userId, "PROCESS_OT_CONFIRM", msg, JSON.stringify(dataToProcess), 1.0, "SAME_SITE", "ยืนยันการทำโอทีที่เดิม");
        finalizeClockInSaving(dataToProcess, userId, replyToken, dataToProcess.checkStatus, null);
        return;
      } else if (msg === "เปลี่ยนไซต์/เปลี่ยนงาน") {
        cache.remove(`PENDING_OT_CONFIRM_${userId}`);
        cache.put(`PENDING_OT_DETAILS_${userId}`, JSON.stringify(dataToProcess), 300);
        if (typeof logAuditTrail === "function") logAuditTrail(userId, "PROCESS_OT_CONFIRM", msg, JSON.stringify(dataToProcess), 1.0, "CHANGE_SITE", "ร้องขอเปลี่ยนไซต์ทำโอที");
        reply(replyToken, "กรุณาพิมพ์ ไซต์งาน / งานที่ทำโอที ครับ");
        return;
      } else if (msg === "ยกเลิกลงเวลา") {
        cache.remove(`PENDING_OT_CONFIRM_${userId}`);
        if (typeof logAuditTrail === "function") logAuditTrail(userId, "PROCESS_OT_CONFIRM", msg, JSON.stringify(dataToProcess), 1.0, "REJECT", "ยกเลิกการลงเวลาช่วงโอที");
        reply(replyToken, "❌ ยกเลิกเรียบร้อยครับ");
        return;
      }
    }

    if (pendingClockIn12) {
      if (msg === "ยืนยันตามเวลาที่แจ้ง" || msg === "ลงเวลา 13.00 น.") {
        processPendingClockIn(msg, pendingClockIn12, userId, replyToken);
        if (typeof logAuditTrail === "function") logAuditTrail(userId, "PROCESS_CLOCKIN_12", msg, pendingClockIn12, 1.0, "CONFIRM_12", "ยืนยันเวลาทำงานช่วงบ่าย");
        return;
      } else if (msg === "ยกเลิกลงเวลา") {
        cache.remove(`PENDING_CLOCKIN_${userId}`);
        if (typeof logAuditTrail === "function") logAuditTrail(userId, "PROCESS_CLOCKIN_12", msg, pendingClockIn12, 1.0, "REJECT_12", "ยกเลิกการยืนยันเวลาช่วงบ่าย");
        reply(replyToken, "❌ ยกเลิกเรียบร้อยครับ");
        return;
      }
    }

    let commandText = msg;
    if (msg.startsWith("#")) commandText = msg.substring(1).trim();

    // --- 👑 หมวดคำสั่งผู้ดูแลระบบ (Admin Only) ---
    if (isUserAdmin) {
      if (commandText.startsWith("ตั้งค่า")) {
        const parts = commandText.replace("ตั้งค่า", "").trim().split("=");
        if (parts.length >= 2) {
          if (typeof setDynamicConfig === "function") setDynamicConfig(parts[0].trim(), parts.slice(1).join("=").trim());
          if (typeof logAuditTrail === "function") logAuditTrail(userId, "ADMIN_CONFIG", commandText, parts[0].trim(), 1.0, "SET_CONFIG", "แอดมินเปลี่ยนค่าระบบ");
          reply(replyToken, `⚙️ บันทึกการตั้งค่าสำเร็จ!\n[${parts[0].trim()}] => ${parts.slice(1).join("=").trim()}`);
        } else {
          reply(replyToken, `⚠️ ตัวอย่าง: ตั้งค่า FUZZY_THRESHOLD=0.85`);
        }
        return;
      }

      if (commandText === "รายงาน" || commandText === "สร้างรายงาน" || commandText === "report") {
        reply(replyToken, "⏳ กำลังประมวลผลดึงข้อมูลและสร้างรายงาน... รอสักครู่ครับ");
        if (typeof generateProjectReportAndNotify === "function") {
          const reportStatus = generateProjectReportAndNotify();
          if (typeof logAuditTrail === "function") logAuditTrail(userId, "ADMIN_REPORT", commandText, "GENERATE", 1.0, "REPORT", "แอดมินสั่งออกรายงานสรุปโครงการ");
          reply(replyToken, reportStatus);
        } else {
          reply(replyToken, "❌ ไม่พบระบบสร้างรายงาน (generateProjectReportAndNotify)");
        }
        return;
      }

      if (commandText.startsWith("กู้คืนระบบ") || commandText.startsWith("rollback")) {
        let step = 1;
        const parts = commandText.split(" ");
        if (parts.length > 1 && !isNaN(parseInt(parts[1]))) step = parseInt(parts[1]);
        if (typeof rollbackLogic === "function") {
          const rollbackRes = rollbackLogic(userId, step);
          if (typeof logAuditTrail === "function") logAuditTrail(userId, "ADMIN_ROLLBACK", commandText, "STEP_" + step, 1.0, "ROLLBACK", "แอดมินสั่งกู้คืนระบบย้อนหลัง");
          reply(replyToken, rollbackRes.success ? rollbackRes.message : rollbackRes.error);
        } else {
          reply(replyToken, "❌ ไม่พบระบบจัดการตรรกะ (rollbackLogic)");
        }
        return;
      }

      if (commandText === "เปิดระบบ") {
        if (typeof setDynamicConfig === "function") setDynamicConfig("SYSTEM_STATUS", "ON");
        if (typeof logAuditTrail === "function") logAuditTrail(userId, "SYSTEM_TOGGLE", msg, "ON", 1.0, "SYSTEM_ON", "เปิดระบบทำงาน");
        reply(replyToken, "🟢 เปิดระบบทำงานแล้ว");
        return;
      }

      if (commandText === "ปิดระบบ") {
        if (typeof setDynamicConfig === "function") setDynamicConfig("SYSTEM_STATUS", "OFF");
        if (typeof logAuditTrail === "function") logAuditTrail(userId, "SYSTEM_TOGGLE", msg, "OFF", 1.0, "SYSTEM_OFF", "ปิดระบบทำงาน");
        reply(replyToken, "🔴 ปิดรับการลงเวลาชั่วคราว");
        return;
      }

      if (commandText === "สรุปย้ายแชท") {
        const summaryBlueprint = typeof generateHandoverBlueprint === "function" ? generateHandoverBlueprint() : "Blueprint V12 Active";
        reply(replyToken, summaryBlueprint);
        return;
      }

      if (commandText === "ทดสอบระบบ" || commandText === "ปิดโหมดทดสอบ") {
        handleTestMode(commandText, replyToken);
        return;
      }
    }

    if (systemStatus === "OFF" && !isUserAdmin) return;

    // --- 👷 หมวดคำสั่งทั่วไป & ลงเวลาหน้างาน ---
    if (/^(เช็คไอดีกลุ่ม|ไอดีกลุ่ม|groupid)$/i.test(commandText)) {
      if (source.type === "group") {
        reply(replyToken, `🆔 **LINE Group ID ของกลุ่มนี้คือ:**\n\n\`${groupId}\`\n\n*(สามารถคัดลอกไปใช้ตั้งค่าในระบบสคริปต์ได้ทันที)*`);
      } else {
        reply(replyToken, "⚠️ คำสั่งนี้ใช้ได้เฉพาะการพิมพ์ภายใน 'ไลน์กลุ่ม' เท่านั้นครับ");
      }
      return;
    }

    if (commandText === "ยกเลิกรายการล่าสุด" || commandText === "ยกเลิกล่าสุด") {
      if (typeof logAuditTrail === "function") logAuditTrail(userId, "USER_UNDO", msg, "UNDO_LAST", 1.0, "UNDO", "ผู้ใช้ขอยกเลิกรายการล่าสุด");
      handleUndoLastAction(userId, replyToken);
      return;
    }

    if (commandText.startsWith("ยกเลิก") && commandText.length > 10 && !commandText.includes("/")) {
      handleUndoFromText(commandText.replace("ยกเลิก", "").trim(), replyToken);
      return;
    }

    if (commandText.startsWith("ยกเลิก") && commandText.includes("/")) {
      const p = commandText.replace("ยกเลิก", "").trim().split(" ");
      if (p.length >= 2 && typeof undoLastEntry === "function") {
        reply(replyToken, undoLastEntry(p[0], p[1]));
      }
      return;
    }

    if (commandText.startsWith("เช็ครายงาน")) {
      handleCheckReport(commandText, userId, replyToken);
      return;
    }

    if (/^(คู่มือ|วิธีใช้|help|คำสั่ง)/i.test(commandText)) {
      reply(replyToken, "📘 คู่มือคำสั่ง\n1️⃣ ส่งรูปบัตรตอก\n2️⃣ ตามด้วยข้อความ:\n#1/5/69\nสวนหลวง เข้า สวนหลวง\n08.00-17.00\nทั้งหมด 3 คน");
      return;
    }

    if (/^(ลา|ขอลา|เช็ค|ดูยอด|ใครขาด|สรุปยอด|ประกาศ:|ลบ|สถานะระบบ)/.test(commandText)) {
      if (commandText === "ใครขาด" && typeof handleCheckAbsent === "function") {
        const tzTodayStr = Utilities.formatDate(new Date(), "Asia/Bangkok", "dd/MM/yyyy");
        reply(replyToken, handleCheckAbsent(tzTodayStr));
        return;
      }
      handleCommands(commandText, replyToken, userId);
      return;
    }

    // จับคู่แพทเทิร์นวันที่เพื่อส่งไปบันทึกเวลาปฏิบัติงานประจำวัน
    if (/^\d{1,2}[\/.-]\d{1,2}/.test(commandText) || /^\#\d{1,2}[\/.-]\d{1,2}/.test(msg)) {
      if (typeof logAuditTrail === "function") logAuditTrail(userId, "CLOCKIN_ENTRY", msg, "RAW_TEXT", 1.0, "SUBMIT", "พนักงานส่งข้อความบันทึกเวลารูปแบบข้อความทั่วไป");
      handleClockIn(msg, userId, replyToken);
      return;
    }

    // สแกนจับชื่อพนักงานลอยเพื่ออำนวยความสะดวกในการตรวจสอบล่วงหน้า
    if (typeof extractEmployeesFromText === "function" && typeof formatResponse === "function") {
      const extractedEmployees = extractEmployeesFromText(msg);
      if (extractedEmployees.length > 0) {
        if (typeof logAuditTrail === "function") logAuditTrail(userId, "NAME_MATCHED", msg, "AI_SCAN", 1.0, "SCAN", `พบ ${extractedEmployees.length} รายชื่อ`);
        const mockInfo = { date: "วันนี้", time: "รอแก้ไข", site: "รอแก้ไข" };
        const replyMsg = formatResponse(extractedEmployees, mockInfo);
        reply(replyToken, replyMsg);
        return;
      }
    }

  } else if (message.type === "image") {
    if (typeof logAuditTrail === "function") logAuditTrail(userId, "IMAGE_ENTRY", "IMAGE_MESSAGE_ID_" + message.id, "IMAGE", 1.0, "SUBMIT_IMAGE", "พนักงานอัปโหลดรูปภาพบัตรตอก");
    handleImageProcess(message.id, replyToken, userId);
  }
}

/**
 * 🌐 Web App Gateway ขาเข้าสำหรับการวิเคราะห์ตรวจสอบ
 */
function handleWebAppGateway(data) {
  if (typeof logAuditTrail === "function") {
    logAuditTrail("WEB_APP_BOT", "WEBAPP_REQUEST", JSON.stringify(data), "RECEIVED", 1.0, "WEBAPP", "รับข้อมูลจาก Web App");
  }
}

/**
 * 👷 Core Logic: จัดการถอดรหัสข้อความและบันทึกเวลาทำงานลงฐานข้อมูลประจำวัน
 */
function handleClockIn(msg, userId, token) {
  let data;
  let cache;
  let pendingCodes;

  try {
    data = parseComplexMessage(msg);
    cache = CacheService.getScriptCache();
    pendingCodes = cache.get(`PENDING_IMG_CODES_${userId}`);

    const isOtNoonMissed = /(OT|โอที)\s*เที่ยง/i.test(msg) && (!data || !data.employees || !data.employees.some(emp => emp.has_ot_noon));

    if (!data || !data.date || !data.default_site || isOtNoonMissed) {
      data = processMessageWithAI(msg);
      if (data) {
        const countMatch = msg.match(/ทั้งหมด\s*(\d+)\s*คน/);
        if (countMatch) data.expected_count = parseInt(countMatch[1], 10);

        const matchOT = msg.match(/(OT|โอที)\s*เที่ยง\s*(?:(\d{1,2}[.:]\d{2})\s*[-ถึง]\s*(\d{1,2}[.:]\d{2}))?/i);
        if (matchOT) {
          data.has_ot_noon = true;
          if (matchOT[2] && matchOT[3]) {
            data.ot_noon_in = matchOT[2].replace(':', '.');
            data.ot_noon_out = matchOT[3].replace(':', '.');
          }
        }
      }
    }
  } catch (err) {
    if (typeof logErrorToSheet === "function") logErrorToSheet(null, msg, "Error parsing message: " + err.message);
    reply(token, "❌ ระบบไม่สามารถอ่านข้อความได้ กรุณาตรวจสอบรูปแบบครับ");
    return;
  }

  if (pendingCodes && data) {
    const empList = getEmployeesByCodes(JSON.parse(pendingCodes));
    if (data.expected_count && data.expected_count > 0 && empList.length !== data.expected_count) {
      reply(token, `⚠️ จำนวนพนักงานไม่ตรงกัน!\nคุณพิมพ์แจ้ง: "${data.expected_count} คน"\nระบบอ่านจากรูปได้: "${empList.length} คน"\n👉 รบกวนตรวจสอบและส่งรูปใหม่ครับ`);
      cache.remove(`PENDING_IMG_CODES_${userId}`);
      return;
    }
    if (empList.length > 0) {
      data.employees = empList.map(e => ({
        firstname: e.firstname,
        lastname: e.lastname,
        task: data.has_ot_noon ? "ทำงาน (OTเที่ยง)" : "ทำงาน",
        has_ot_noon: data.has_ot_noon || false,
        ot_noon_in: data.ot_noon_in || "12.00",
        ot_noon_out: data.ot_noon_out || "13.00",
        accom: data.default_Accom || ""
      }));
      cache.remove(`PENDING_IMG_CODES_${userId}`);
    }
  }

  if (!data || !data.date || !data.employees || data.employees.length === 0) {
    if (typeof logErrorToSheet === "function") logErrorToSheet(getTargetFileIdByDate(null), msg, "❌ ไม่พบรายชื่อพนักงาน");
    reply(token, "❌ ข้อมูลไม่ครบครับ!\nหากต้องการลงเวลาโดยไม่พิมพ์ชื่อ โปรดส่ง 'รูปบัตรตอก' เข้ามาก่อนครับ");
    return;
  }

  data.original_msg = msg;
  const check = checkDate(data.date);

  const adminIdStr = PropertiesService.getScriptProperties().getProperty("ADMIN_LINE_IDS") || "";
  const adminArray = adminIdStr.split(",").map(id => id.trim());
  const isUserAdmin = adminArray.includes(userId) || (typeof isAdmin === "function" && isAdmin(userId));

  if (check.status === "BLOCK" && !isUserAdmin) {
    reply(token, `⛔ ${check.msg}`);
    return;
  }

  checkOTAndProceed(data, userId, token, check, getTargetFileIdByDate(data.date));

  if (typeof formatResponse === "function") {
    const info = {
      date: data.date,
      time: (data.time_start && data.time_end) ? `${data.time_start}-${data.time_end}` : "ตามเวลาปกติ",
      site: data.default_site,
      accom: (data.employees && data.employees[0]?.accom) || data.default_Accom || "ไม่ได้ระบุ"
    };

    const finalMsg = formatResponse(data.employees, info);
    reply(token, finalMsg);
  }
}

/**
 * ตรวจสอบเงื่อนไขโอทีเพื่อประมวลผลขั้นตอนถัดไป
 */
function checkOTAndProceed(dataToProcess, userId, token, check, targetFileId) {
  const toMins = (t) => { 
    if (!t) return 0; 
    const parts = t.toString().replace('.', ':').split(':'); 
    return (parseInt(parts[0], 10) || 0) * 60 + (parseInt(parts[1], 10) || 0); 
  };
  
  const sMins = toMins(dataToProcess.time_start);
  let eMins = toMins(dataToProcess.time_end);
  let hasOT = false;

  if (eMins > 0) {
    if (eMins < sMins) eMins += 24 * 60;
    let otMins = 0;
    if (sMins < 480) otMins += (Math.min(eMins, 480) - sMins);
    if (eMins > 1020) otMins += (eMins - Math.max(sMins, 1020));

    let hasNoonOt = false;
    let noonOtMins = 0;
    
    if (dataToProcess.employees) {
      dataToProcess.employees.forEach(emp => {
        if (emp.has_ot_noon) {
          hasNoonOt = true;
          noonOtMins = Math.max(noonOtMins, toMins(emp.ot_noon_out || "13.00") - toMins(emp.ot_noon_in || "12.00"));
        }
      });
    }
    if (hasNoonOt) otMins += noonOtMins;
    if (otMins > 0) hasOT = true;
  }

  if (hasOT) {
    dataToProcess.checkStatus = check;
    CacheService.getScriptCache().put(`PENDING_OT_CONFIRM_${userId}`, JSON.stringify(dataToProcess), 300);
    replyWithButtons(token, `ตรวจพบการทำ OT\nโปรดยืนยันว่า... ทำ OT ที่ไซต์งานเดิม และ ลักษณะงานเดิม หรือไม่?`, ["ทำที่เดิม/งานเดิม", "เปลี่ยนไซต์/เปลี่ยนงาน", "ยกเลิกลงเวลา"]);
  } else {
    finalizeClockInSaving(dataToProcess, userId, token, check, null, targetFileId);
  }
}

/**
 * ประมวลผลสถานะยืนยันช่วงเวลาบ่ายที่ค้างในระบบคิว
 */
function processPendingClockIn(answer, pendingDataStr, userId, token) {
  try {
    let dataToProcess = JSON.parse(pendingDataStr);
    if (answer === "ลงเวลา 13.00 น.") dataToProcess.time_start = "13.00";
    CacheService.getScriptCache().remove(`PENDING_CLOCKIN_${userId}`);
    checkOTAndProceed(dataToProcess, userId, token, dataToProcess.checkStatus, null);
  } catch (e) {
    CacheService.getScriptCache().remove(`PENDING_CLOCKIN_${userId}`);
    reply(token, "❌ ข้อมูลหมดอายุครับ");
  }
}

/**
 * บันทึกข้อมูลรายงานขั้นสุดท้ายลงหน้าชีตเป้าหมายประจำวันและจัดการข้อความสรุปปิดงาน
 */
function finalizeClockInSaving(data, userId, token, check, customOt, targetId) {
  const isTesting = PropertiesService.getScriptProperties().getProperty("IS_TESTING") === "TRUE";
  if (!targetId) targetId = getTargetFileIdByDate(data.date);
  if (!targetId) { reply(token, "❌ ไม่พบไฟล์สำหรับเดือนนี้"); return; }

  const writeRes = typeof writeToDailySheetBatch === 'function'
    ? writeToDailySheetBatch(data, userId, targetId)
    : writeToDailySheet(data, userId, targetId);

  let customOtSite = null; 
  let customOtTask = null;
  
  if (customOt && writeRes && writeRes.count > 0) {
    let parts = customOt.split('/');
    customOtSite = parts[0] ? parts[0].trim() : data.default_site;
    customOtTask = parts[1] ? parts[1].trim() : "ทำ OT";

    try {
      const ss = SpreadsheetApp.openById(targetId);
      const targetSheetName = parseThaiDate(data.date);
      let sheet = ss.getSheetByName(targetSheetName);

      if (!sheet) {
        const cleanTarget = targetSheetName.replace(/\s+/g, "");
        const sheets = ss.getSheets();
        for (let i = 0; i < sheets.length; i++) {
          if (sheets[i].getName().replace(/\s+/g, "") === cleanTarget) { sheet = sheets[i]; break; }
        }
      }

      if (sheet) {
        const startRow = parseInt(getDynamicConfig("START_ROW"), 10) || 3;
        const dbData = sheet.getRange(startRow, 4, Math.max(1, sheet.getLastRow() - startRow + 1), 2).getValues();

        data.employees.forEach(emp => {
          const inputName = typeof normalize === 'function' ? normalize(emp.firstname) : emp.firstname;
          for (let i = 0; i < dbData.length; i++) {
            if (normalize(dbData[i][0]) === inputName) {
              sheet.getRange(i + startRow, 9).setValue(customOtSite);
              sheet.getRange(i + startRow, 10).setValue(customOtTask);
              break;
            }
          }
        });
      }
    } catch (e) { 
      console.error("Custom OT error: " + e.message); 
    }
  }

  let txt = "";
  if (writeRes && writeRes.errors && writeRes.errors.length > 0) {
    txt += `⚠️ หาชื่อไม่พบ: ${writeRes.errors.join(', ')}\n`;
  }
  if (txt !== "" || !writeRes || writeRes.count === 0) {
    if (typeof logErrorToSheet === "function") logErrorToSheet(targetId, data.original_msg, txt || "บันทึกไม่ได้");
  }

  let countValue = writeRes ? writeRes.count : 0;
  let timeStatus = (!data.time_end || data.time_end === "") ? `(ลงเวลาเข้า: ${data.time_start})` : `(เวลา: ${data.time_start}-${data.time_end})`;
  let displaySite = data.default_site; 
  if (customOtSite) displaySite += `\n[ไซต์ OT: ${customOtSite} | งาน OT: ${customOtTask}]`;
  
  const accomText = data.default_Accom || (writeRes && writeRes.accom) || 'ไม่ได้ระบุ';

  reply(token, `${countValue === 0 ? "❌ ไม่พบข้อมูล" : `✅ บันทึกสำเร็จ ${countValue} คน`}${data.date ? `\n📅 วันที่: ${data.date}` : ""}\n${timeStatus}\nไซต์: ${displaySite}\n[ที่พัก: ${accomText}]${isTesting ? "\n🧪 [โหมดทดสอบ]" : ""}${txt ? "\n" + txt : ""}\n\n📌 โปรดตรวจเช็คความถูกต้อง หากผิดพลาดแจ้งแอดมินทันที`);
}

/**
 * จัดการแกะรหัสผ่านรูปภาพบัตรตอกโดยเรียกโครงข่ายประสาทเทียม Gemini Vision
 */
function handleImageProcess(mId, tk, uId) {
  try {
    const blob = UrlFetchApp.fetch(`https://api-data.line.me/v2/bot/message/${mId}/content`, {
      headers: { Authorization: "Bearer " + getDynamicConfig('LINE_CHANNEL_ACCESS_TOKEN') }
    }).getBlob();

    let aiRes = callGeminiVision(Utilities.base64Encode(blob.getBytes()), `JSON: { "codes": ["52011"] }`, "image/jpeg");
    if (!aiRes || !aiRes.codes) {
      reply(tk, "❌ AI มองไม่เห็นรหัส");
      return;
    }

    const emps = getEmployeesByCodes(aiRes.codes);
    if (emps.length === 0) {
      reply(tk, `⚠️ พบรหัสแต่ไม่มีในฐานข้อมูล`);
      return;
    }

    CacheService.getScriptCache().put(`PENDING_IMG_CODES_${uId}`, JSON.stringify(aiRes.codes), 600);

    const todayDate = Utilities.formatDate(new Date(), "GMT+7", "dd/MM/yyyy");
    const replyMsg = `✅ ตรวจพบพนักงาน ${emps.length} คน\n📅 วันที่: ${todayDate}\n(เวลา: กำลังรอการแจ้งเวลา)\nไซต์: กำลังรอแจ้ง\n[ที่พัก: กำลังรอแจ้ง]\n\n📌 โปรดพิมพ์รายละเอียดงานเพื่อบันทึกต่อได้เลยครับ`;
    reply(tk, replyMsg);

  } catch (e) {
    reply(tk, "❌ Error: " + e.message);
  }
}

/**
 * ดำเนินการย้อนกลับการกระทำล่าสุดของยูสเซอร์ช่างผู้รายงานงาน
 */
function handleUndoLastAction(userId, token) {
  const props = PropertiesService.getScriptProperties();
  const lastJson = props.getProperty(`LAST_ENTRY_${userId}`);
  if (!lastJson) {
    reply(token, "⚠️ ไม่พบรายการล่าสุด");
    return;
  }
  try {
    const last = JSON.parse(lastJson);
    if (typeof undoLastEntry === "function" && last.names && last.names.length > 0) {
      reply(token, undoLastEntry(last.names[0], last.date));
    }
    props.deleteProperty(`LAST_ENTRY_${userId}`);
  } catch (e) {
    reply(token, "❌ Undo Error");
  }
}

/**
 * ดำเนินการย้อนกลับข้อมูลจากเนื้อหาข้อความพิมพ์
 */
function handleUndoFromText(text, token) {
  const dataToUndo = parseComplexMessage(text);
  if (!dataToUndo || !dataToUndo.date) {
    reply(token, "❌ ไม่พบวันที่");
    return;
  }
  try {
    if (typeof undoLastEntry === "function" && dataToUndo.employees && dataToUndo.employees.length > 0) {
      reply(token, undoLastEntry(dataToUndo.employees[0].firstname, dataToUndo.date));
    }
  } catch (e) {
    reply(token, "❌ Undo Error");
  }
}

function handleCheckReport(content, userId, replyToken) {
  reply(replyToken, "ฟังก์ชันเช็ครายงานอยู่ระหว่างอัปเกรดฐานข้อมูลครับ");
}

function handleCommands(msg, token, userId) {
  const raw = callGemini(msg, `Analyze intent: LEAVE, BROADCAST, HELP, SYSTEM_STATUS. JSON {intent, data}`, true);
  if (!raw) return;

  switch (raw.intent) {
    case "LEAVE":
      if (typeof recordLeaveData === "function" && raw.data) {
        reply(token, recordLeaveData(raw.data.name, raw.data.type, raw.data.date));
      }
      break;
    case "SYSTEM_STATUS":
      reply(token, `⚙️ Status ระบบ: ${getDynamicConfig("SYSTEM_STATUS")}`);
      break;
    default:
      reply(token, "⚠️ ไม่เข้าใจคำสั่ง");
  }
}

function handleTestMode(content, replyToken) {
  PropertiesService.getScriptProperties().setProperty("IS_TESTING", content === "ทดสอบระบบ" ? "TRUE" : "FALSE");
  reply(replyToken, content === "ทดสอบระบบ" ? "🧪 เปิดโหมดทดสอบแล้ว" : "🧹 ปิดโหมดทดสอบแล้ว");
}

/**
 * ตรวจสอบระดับสิทธิ์ผู้ดูแลระบบ (Admin) จากฐานโครงคอนฟิกความปลอดภัยส่วนกลาง
 */
function isAdmin(userId) {
  if (typeof GLOBAL_CONFIG !== "undefined" && GLOBAL_CONFIG.ADMIN_LINE_IDS) {
    return GLOBAL_CONFIG.ADMIN_LINE_IDS.includes(userId);
  }
  const adminIdStr = PropertiesService.getScriptProperties().getProperty("ADMIN_LINE_IDS") || "";
  return adminIdStr.split(",").map(id => id.trim()).includes(userId);
}

/**
 * ดึงข้อมูลกลุ่มไลน์ที่ได้รับการอนุญาตใช้งาน (Whitelist)
 */
function getSavedGroupWhitelist() {
  var cache = CacheService.getScriptCache();
  var cachedWhitelist = cache.get("GROUP_WHITELIST");

  if (cachedWhitelist) {
    return JSON.parse(cachedWhitelist);
  }

  var whitelist = [];
  var properties = PropertiesService.getScriptProperties();
  var whitelistString = properties.getProperty("ALLOWED_GROUP_IDS");

  if (whitelistString) {
    whitelist = whitelistString.split(",").map(function (id) { return id.trim(); });
  } else {
    try {
      var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName("ตั้งค่า");
      if (sheet) {
        var data = sheet.getRange("A2:A").getValues();
        whitelist = data.map(function (row) { return row[0].toString().trim(); })
          .filter(function (id) { return id !== ""; });
      }
    } catch (e) {
      Logger.log("Error reading whitelist sheet: " + e);
    }
  }

  if (whitelist.length > 0) {
    cache.put("GROUP_WHITELIST", JSON.stringify(whitelist), 3600);
  }

  return whitelist;
}

/**
 * บันทึกเหตุการณ์เชิงตรวจสอบของระบบ (Audit Log ระบบ)
 */
function logSystemEvent(actionType, source, details) {
  try {
    const timestamp = Utilities.formatDate(new Date(), "Asia/Bangkok", "yyyy-MM-dd HH:mm:ss");
    console.log(`[${timestamp}] [AUDIT] ${actionType} | ${source} | ${details}`);
  } catch (e) {
    console.error("Log failed: " + e.message);
  }
}