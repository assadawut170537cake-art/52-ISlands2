<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { font-family: 'Arial', sans-serif; padding: 12px; background-color: #fdfbf7; color: #333; font-size: 13px; }
      .form-group { margin-bottom: 12px; }
      label { display: block; font-weight: bold; margin-bottom: 6px; color: #1a252f; }
      textarea { font-family: 'Courier New', monospace; width: 100%; height: 340px; padding: 8px; box-sizing: border-box; border: 1px solid #bdc3c7; border-radius: 4px; font-size: 12px; background-color: #fff; resize: vertical; }
      button { width: 100%; padding: 12px; background-color: #2c3e50; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.2s; margin-top: 8px; }
      button:hover { background-color: #34495e; }
      #status { margin-top: 12px; padding: 10px; border-radius: 4px; display: none; font-weight: bold; font-size: 12px; line-height: 1.4; }
      .notice { font-size: 11px; color: #7f8c8d; margin-top: 6px; line-height: 1.3; }
    </style>
  </head>
  <body>
    <h3>DevOps Auto Injector (V11)</h3>
    <hr style="border: 0; border-top: 1px solid #d5dbdb; margin-bottom: 12px;">
    
    <div class="form-group">
      <label>📥 วางบล็อกโค้ดตัวอัปเดตจากพี่ AI</label>
      <textarea id="newCode" placeholder="ก๊อปปี้โค้ดจากแชทรวมบรรทัดแรกสุดมาวางที่นี่ได้เลยครับน้อง..."></textarea>
      <div class="notice">*ระบบอัจฉริยะจะสแกนคีย์ในบรรทัดแรกเพื่อเจาะพิกัด และตัดคอมเมนต์หัวทิ้งให้เองโดยอัตโนมัติ ตารางทำงานจะไม่พังแน่นอนครับ</div>
    </div>

    <button onclick="executeInjection()">🎯 ยิงโค้ดเข้าล็อกตาราง</button>

    <div id="status"></div>

    <script>
      function executeInjection() {
        const statusDiv = document.getElementById('status');
        const codeInput = document.getElementById('newCode').value;
        
        statusDiv.style.display = 'block';
        statusDiv.style.backgroundColor = '#f1c40f';
        statusDiv.style.color = '#333';
        statusDiv.innerHTML = '⏳ ระบบหลังบ้านกำลังแมตช์ความถูกต้องและแกะพิกัดแถว...';

        if (!codeInput.trim()) {
          showStatus('❌ กรุณาวางรหัสโค้ดที่ก๊อปปี้มาก่อนกดปุ่มครับน้อง', '#e74c3c', 'white');
          return;
        }

        // ตัวสแกนโครงสร้างด่านแรกฝั่งหน้าบ้านป้องกัน Client กดส่งข้อมูลมั่วซั่ว
        if (!codeInput.startsWith('//') || !codeInput.includes('FILE:') || !codeInput.includes('FUNC:')) {
          showStatus('❌ บล็อกโค้ดหลุดฟอร์แมต! บรรทัดแรกต้องมีคอมเมนต์ระบุพิกัดห้ามลบเด็ดขาดครับ', '#e74c3c', 'white');
          return;
        }

        google.script.run
          .withSuccessHandler(function(response) {
            if (response.indexOf('❌') === -1) {
              showStatus(response, '#2ecc71', 'white');
              document.getElementById('newCode').value = ''; 
            } else {
              showStatus(response, '#e74c3c', 'white');
            }
          })
          .withFailureHandler(function(err) {
            showStatus('❌ สไลด์บาร์พัง: ' + err.message, '#e74c3c', 'white');
          })
          .injectCodeFromSidebar({ newCode: codeInput });
      }

      function showStatus(msg, bgColor, textColor) {
        const statusDiv = document.getElementById('status');
        statusDiv.style.backgroundColor = bgColor;
        statusDiv.style.color = textColor;
        statusDiv.innerHTML = msg;
      }
    </script>
  </body>
</html>
