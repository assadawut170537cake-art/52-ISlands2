<script type="text/babel">
/**
 * @function FastTrackVoiceLogger
 * @description คอมโพเนนต์ระบบสั่งการด้วยเสียงและบันทึกด่วน พร้อม UI อนิเมชัน
 * @param {Object} props - Properties ที่ส่งผ่านจากคอมโพเนนต์หลัก
 * @param {Function} props.onProcessCommand - ฟังก์ชันสำหรับส่งต่อข้อความไปประมวลผล
 */
const FastTrackVoiceLogger = ({ onProcessCommand }) => {
    const [isRecording, setIsRecording] = React.useState(false);
    const [transcript, setTranscript] = React.useState('');

    const toggleRecord = () => {
        try {
            setIsRecording(!isRecording);
            // โลจิกการเชื่อมต่อ Web Speech API จะถูกเชื่อมโยงในส่วน Service ของแอป
            if(!isRecording) {
                console.log("เริ่มการรับเสียง...");
            } else {
                console.log("หยุดการรับเสียง...");
            }
        } catch (error) {
            console.error("Microphone Access Error:", error);
            alert("เกิดข้อผิดพลาดในการเข้าถึงไมโครโฟน กรุณาตรวจสอบการตั้งค่าอนุญาตของเบราว์เซอร์");
        }
    };

    const handleSubmit = () => {
        try {
            if(transcript.trim() === '') return;
            onProcessCommand(transcript);
            setTranscript('');
        } catch (error) {
            console.error("Submit Command Error:", error);
        }
    };

    return (
        <div className="bg-white rounded-xl shadow-lg p-6 mb-6 transition-all duration-300 hover:shadow-xl border border-gray-100">
            <div className="flex items-center justify-between mb-4">
                <h3 className="text-xl font-bold text-gray-800 flex items-center">
                    <span className="material-icons text-blue-600 mr-2">mic</span>
                    FastTrack Voice Logger
                </h3>
                {isRecording && <span className="animate-pulse flex h-3 w-3 rounded-full bg-red-500"></span>}
            </div>
            <div className="flex gap-4 items-center">
                <button
                    onClick={toggleRecord}
                    className={`flex-shrink-0 w-14 h-14 rounded-full flex items-center justify-center transition-all duration-300 ${isRecording ? 'bg-red-500 hover:bg-red-600 shadow-[0_0_15px_rgba(239,68,68,0.5)]' : 'bg-blue-600 hover:bg-blue-700'}`}
                >
                    <span className="material-icons text-white text-2xl">{isRecording ? 'stop' : 'mic'}</span>
                </button>
                <div className="flex-grow flex gap-2">
                    <input
                        type="text"
                        value={transcript}
                        onChange={(e) => setTranscript(e.target.value)}
                        placeholder="พูดคำสั่งหรือพิมพ์ข้อมูลด่วนลงในช่องนี้..."
                        className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all shadow-sm"
                    />
                    <button
                        onClick={handleSubmit}
                        className="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-lg font-medium transition-colors duration-200 flex items-center shadow-md"
                    >
                        <span className="material-icons mr-1">send</span> ส่ง
                    </button>
                </div>
            </div>
        </div>
    );
};

/**
 * @function Dashboard
 * @description คอมโพเนนต์แสดงผลภาพรวมระบบ สถิติการทำงาน และสถานะข้อมูลล่าสุด
 * @param {Object} props - Properties ที่ส่งผ่านจากคอมโพเนนต์หลัก
 * @param {Object} props.workforceData - อ็อบเจกต์ข้อมูลสถิติพนักงานรายวัน
 */
const Dashboard = ({ workforceData }) => {
    try {
        return (
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                {/* Card 1: ค้นหาจากฐานข้อมูล 'รายชื่อพนักงาน' */}
                <div className="bg-gradient-to-br from-blue-500 to-blue-700 rounded-xl shadow-lg p-6 text-white transform hover:scale-105 transition-transform duration-300">
                    <div className="flex justify-between items-start">
                        <div>
                            <p className="text-blue-100 text-sm font-medium mb-1">รายชื่อพนักงานทั้งหมด</p>
                            <h4 className="text-4xl font-bold">{workforceData?.total || 0}</h4>
                        </div>
                        <div className="bg-white bg-opacity-30 p-3 rounded-xl">
                            <span className="material-icons text-3xl">groups</span>
                        </div>
                    </div>
                </div>

                {/* Card 2: มาทำงาน */}
                <div className="bg-gradient-to-br from-green-500 to-green-700 rounded-xl shadow-lg p-6 text-white transform hover:scale-105 transition-transform duration-300">
                    <div className="flex justify-between items-start">
                        <div>
                            <p className="text-green-100 text-sm font-medium mb-1">มาทำงานวันนี้</p>
                            <h4 className="text-4xl font-bold">{workforceData?.present || 0}</h4>
                        </div>
                        <div className="bg-white bg-opacity-30 p-3 rounded-xl">
                            <span className="material-icons text-3xl">how_to_reg</span>
                        </div>
                    </div>
                </div>

                {/* Card 3: ลาหยุด */}
                <div className="bg-gradient-to-br from-yellow-400 to-yellow-600 rounded-xl shadow-lg p-6 text-white transform hover:scale-105 transition-transform duration-300">
                    <div className="flex justify-between items-start">
                        <div>
                            <p className="text-yellow-100 text-sm font-medium mb-1">ลาหยุด / พัก</p>
                            <h4 className="text-4xl font-bold">{workforceData?.leave || 0}</h4>
                        </div>
                        <div className="bg-white bg-opacity-30 p-3 rounded-xl">
                            <span className="material-icons text-3xl">event_busy</span>
                        </div>
                    </div>
                </div>

                {/* Card 4: ขาดงาน */}
                <div className="bg-gradient-to-br from-red-500 to-red-700 rounded-xl shadow-lg p-6 text-white transform hover:scale-105 transition-transform duration-300">
                    <div className="flex justify-between items-start">
                        <div>
                            <p className="text-red-100 text-sm font-medium mb-1">ขาดงาน</p>
                            <h4 className="text-4xl font-bold">{workforceData?.absent || 0}</h4>
                        </div>
                        <div className="bg-white bg-opacity-30 p-3 rounded-xl">
                            <span className="material-icons text-3xl">person_off</span>
                        </div>
                    </div>
                </div>
            </div>
        );
    } catch (error) {
        console.error("Dashboard Render Error:", error);
        return (
            <div className="p-4 bg-red-50 border-l-4 border-red-500 text-red-700 rounded-lg shadow-sm">
                <p className="font-bold">⚠️ ข้อผิดพลาด</p>
                <p>ไม่สามารถโหลดองค์ประกอบกระดานข้อมูลได้ กรุณารีเฟรชหน้าต่างอีกครั้ง</p>
            </div>
        );
    }
};
</script>
